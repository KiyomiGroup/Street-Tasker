<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Task Details — Street Tasker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
  
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   STREET TASKER — Global Design System
   ============================================================ */


:root {
  --ink:#0C0F1A; --ink-soft:#1A1F35; --slate:#5A6380; --mist:#9AA3BC;
  --silver:#C8CEDF; --cloud:#F0F2F8; --white:#FFFFFF;
  --brand:#FF5C28; --brand-deep:#E04818; --brand-glow:rgba(255,92,40,.18); --brand-soft:rgba(255,92,40,.08);
  --teal:#00B4A0; --teal-soft:rgba(0,180,160,.12);
  --green:#22C55E; --amber:#F59E0B; --red:#EF4444; --purple:#8B5CF6;
  --border:rgba(0,0,0,.07); --border-md:rgba(0,0,0,.12);
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 20px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
  --shadow-xl:0 24px 64px rgba(0,0,0,.16),0 8px 24px rgba(0,0,0,.08);
  --shadow-brand:0 8px 24px rgba(255,92,40,.3);
  --r4:4px; --r8:8px; --r12:12px; --r18:18px; --r28:28px; --rfull:9999px;
  --nav-h:68px; --sidebar-w:256px; --max-w:1280px;
  --fd:'Syne',sans-serif; --fb:'Instrument Sans',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--fb);background:var(--cloud);color:var(--ink);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--fb)}
input,textarea,select{font-family:var(--fb)}
ul{list-style:none}
h1,h2,h3,h4,h5{font-family:var(--fd);line-height:1.15;letter-spacing:-.02em}
h1{font-size:clamp(1.875rem,4.5vw,3.25rem);font-weight:800}
h2{font-size:clamp(1.375rem,2.5vw,2.125rem);font-weight:700}
h3{font-size:clamp(1rem,1.8vw,1.35rem);font-weight:700}
h4{font-size:.9375rem;font-weight:600}
p{color:var(--slate);line-height:1.7}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:var(--r8);font-size:.875rem;font-weight:600;border:none;transition:all .2s var(--ease);white-space:nowrap;cursor:pointer;font-family:var(--fb)}
.btn:disabled{opacity:.5;cursor:not-allowed!important;transform:none!important;box-shadow:none!important}
.btn-brand{background:var(--brand);color:#fff;box-shadow:0 4px 14px var(--brand-glow)}
.btn-brand:hover:not(:disabled){background:var(--brand-deep);transform:translateY(-1px);box-shadow:var(--shadow-brand)}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover:not(:disabled){background:var(--ink-soft);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border-md)}
.btn-outline:hover:not(:disabled){background:var(--white);border-color:var(--silver)}
.btn-ghost{background:transparent;color:var(--slate);border:none}
.btn-ghost:hover:not(:disabled){background:var(--cloud);color:var(--ink)}
.btn-teal{background:var(--teal);color:#fff}
.btn-teal:hover:not(:disabled){background:#009e8c;transform:translateY(-1px)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){background:#dc2626}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:7px 14px;font-size:.8125rem;border-radius:7px}
.btn-lg{padding:14px 28px;font-size:1rem;border-radius:var(--r12)}
.btn-xl{padding:17px 36px;font-size:1.0625rem;border-radius:var(--r12)}
.btn-full{width:100%}
.btn-icon{padding:10px;border-radius:var(--r8);aspect-ratio:1;display:inline-flex;align-items:center;justify-content:center}

/* ── Forms ── */
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mist)}
.form-input{padding:12px 16px;border:1.5px solid var(--border-md);border-radius:var(--r8);font-size:.9375rem;background:var(--white);color:var(--ink);outline:none;width:100%;transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-glow)}
.form-input::placeholder{color:var(--silver)}
.form-input.error{border-color:var(--red)}
textarea.form-input{resize:vertical;min-height:96px}
select.form-input{cursor:pointer}
.form-error{font-size:.75rem;color:var(--red);margin-top:2px}
.form-hint{font-size:.75rem;color:var(--mist);margin-top:2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── Cards ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r18);padding:24px;box-shadow:var(--shadow-sm)}
.card-sm{padding:16px;border-radius:var(--r12)}
.card-hover{transition:all .22s var(--ease);cursor:pointer}
.card-hover:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--silver)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--rfull);font-size:.6875rem;font-weight:700;letter-spacing:.03em}
.badge-brand{background:var(--brand-soft);color:var(--brand)}
.badge-teal{background:var(--teal-soft);color:var(--teal)}
.badge-green{background:rgba(34,197,94,.12);color:#16a34a}
.badge-amber{background:rgba(245,158,11,.12);color:#d97706}
.badge-red{background:rgba(239,68,68,.12);color:#dc2626}
.badge-purple{background:rgba(139,92,246,.12);color:#7c3aed}
.badge-gray{background:var(--cloud);color:var(--slate)}
.badge-open{background:rgba(34,197,94,.1);color:#16a34a}
.badge-assigned{background:rgba(245,158,11,.1);color:#d97706}
.badge-in_progress{background:rgba(59,130,246,.1);color:#2563eb}
.badge-completed{background:rgba(139,92,246,.1);color:#7c3aed}
.badge-cancelled{background:rgba(239,68,68,.1);color:#dc2626}

/* ── Avatar ── */
.avatar{border-radius:50%;object-fit:cover;background:var(--brand-soft);display:inline-flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:700;color:var(--brand);flex-shrink:0;vertical-align:middle}
.avatar-xs{width:28px;height:28px;font-size:10px;border-radius:50%}
.avatar-sm{width:36px;height:36px;font-size:13px;border-radius:50%}
.avatar-md{width:48px;height:48px;font-size:16px;border-radius:50%}
.avatar-lg{width:64px;height:64px;font-size:22px;border-radius:50%}
.avatar-xl{width:96px;height:96px;font-size:32px;border-radius:50%}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── Stars ── */
.stars{color:var(--amber);font-size:.875rem}

/* ── Layout ── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 clamp(16px,4vw,48px)}
.page-wrap{padding-top:var(--nav-h);min-height:100vh}

/* ── Navbar ── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);background:rgba(255,255,255,.95);backdrop-filter:blur(16px) saturate(180%);border-bottom:1px solid var(--border);display:flex;align-items:center}
.navbar-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:var(--max-w);margin:0 auto;padding:0 clamp(16px,4vw,48px);gap:20px}
.nav-logo{font-family:var(--fd);font-size:1.25rem;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.nav-logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#FF8C5A);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px var(--brand-glow);flex-shrink:0}
.nav-logo span{color:var(--brand)}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{padding:8px 13px;border-radius:8px;font-size:.875rem;font-weight:500;color:var(--slate);transition:all .18s;text-decoration:none;cursor:pointer;border:none;background:none}
.nav-link:hover,.nav-link.active{background:var(--brand-soft);color:var(--brand)}
.nav-actions{display:flex;align-items:center;gap:10px}
.nav-user{display:flex;align-items:center;gap:10px;padding:6px 6px 6px 14px;background:var(--white);border:1px solid var(--border-md);border-radius:var(--rfull);cursor:pointer;transition:all .18s}
.nav-user:hover{border-color:var(--brand)}
.nav-user-name{font-size:.875rem;font-weight:600}
.notif-btn{position:relative;width:38px;height:38px;border-radius:50%;background:var(--cloud);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .18s}
.notif-btn:hover{background:var(--brand-soft)}
.notif-dot{position:absolute;top:4px;right:4px;width:9px;height:9px;border-radius:50%;background:var(--brand);border:2px solid white}

/* ── Bottom nav (mobile) ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:60px;background:white;border-top:1px solid var(--border);display:none;align-items:center;justify-content:space-around;padding:0 4px}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:var(--r8);font-size:.6rem;font-weight:700;color:var(--mist);cursor:pointer;transition:all .18s;text-decoration:none;text-transform:uppercase;letter-spacing:.04em;flex:1}
.bn-item .bn-icon{font-size:1.25rem;line-height:1}
.bn-item.active{color:var(--brand)}
.bn-fab{width:48px;height:48px;border-radius:50%;background:var(--brand);color:white;border:none;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow-brand);transform:translateY(-8px);cursor:pointer;flex-shrink:0}

/* ── Section ── */
.section{padding:clamp(48px,7vw,88px) 0}
.section-eyebrow{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--brand);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-eyebrow::before{content:'';display:block;width:18px;height:2px;background:var(--brand);border-radius:1px}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:clamp(24px,4vw,40px);gap:16px;flex-wrap:wrap}

/* ── Task Card ── */
.task-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r18);padding:20px;box-shadow:var(--shadow-xs);transition:all .22s var(--ease);cursor:pointer;display:flex;flex-direction:column;gap:12px;text-decoration:none;color:inherit}
.task-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--silver)}
.task-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.task-card-title{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.3}
.task-card-budget{font-family:var(--fd);font-size:1.125rem;font-weight:800;color:var(--brand);white-space:nowrap}
.task-card-desc{font-size:.875rem;color:var(--slate);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-meta{display:flex;gap:12px;flex-wrap:wrap}
.task-meta-item{display:flex;align-items:center;gap:5px;font-size:.8125rem;color:var(--mist);font-weight:500}
.task-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}

/* ── Profile card ── */
.tasker-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r18);padding:20px;text-align:center;transition:all .22s var(--ease);cursor:pointer}
.tasker-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.tasker-skills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px}

/* ── Category chip ── */
.cat-chip{padding:8px 16px;border-radius:var(--rfull);font-size:.8125rem;font-weight:600;background:white;border:1.5px solid var(--border-md);color:var(--slate);cursor:pointer;transition:all .18s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.cat-chip:hover,.cat-chip.active{background:var(--brand);border-color:var(--brand);color:white}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:28px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 18px;font-weight:600;font-size:.875rem;cursor:pointer;color:var(--mist);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .18s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--fb)}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab-btn:hover{color:var(--ink)}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .25s ease}

/* ── Steps ── */
.steps{display:flex;align-items:center;gap:0;margin-bottom:36px}
.step-item{display:flex;align-items:center;flex:1}
.step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8125rem;border:2px solid var(--border-md);background:white;color:var(--mist);flex-shrink:0;transition:all .3s}
.step-circle.done{background:var(--teal);border-color:var(--teal);color:white}
.step-circle.active{background:var(--brand);border-color:var(--brand);color:white}
.step-line{flex:1;height:2px;background:var(--border-md)}
.step-line.done{background:var(--teal)}
.step-label{font-size:.6875rem;font-weight:600;color:var(--mist);margin-top:5px;text-align:center;white-space:nowrap}
.step-label.active{color:var(--brand)}
.step-label.done{color:var(--teal)}

/* ── Toast ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--ink);color:white;padding:14px 20px;border-radius:var(--r12);box-shadow:var(--shadow-lg);font-size:.875rem;font-weight:500;max-width:340px;display:flex;align-items:center;gap:12px;animation:slideIn .3s ease;pointer-events:all}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--brand)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(12,15,26,.75);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:var(--r28);padding:clamp(24px,4vw,40px);max-width:520px;width:100%;box-shadow:var(--shadow-xl);transform:translateY(20px);transition:transform .25s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.modal-close{background:var(--cloud);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;color:var(--slate)}

/* ── Chat ── */
.chat-wrap{display:flex;flex-direction:column;height:420px;border:1px solid var(--border);border-radius:var(--r18);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--cloud)}
.chat-bubble{max-width:72%;padding:10px 14px;border-radius:var(--r12);font-size:.875rem;line-height:1.5}
.chat-bubble.sent{background:var(--brand);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.received{background:white;color:var(--ink);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-meta{font-size:.625rem;opacity:.65;margin-top:4px}
.chat-input-bar{display:flex;gap:10px;padding:14px 16px;background:white;border-top:1px solid var(--border);align-items:flex-end}
.chat-input{flex:1;border:1.5px solid var(--border-md);border-radius:var(--r8);padding:10px 14px;font-family:var(--fb);font-size:.875rem;resize:none;min-height:42px;max-height:100px;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--brand)}

/* ── Dashboard ── */
.dash-layout{display:flex;min-height:calc(100vh - var(--nav-h))}
.dash-sidebar{width:var(--sidebar-w);flex-shrink:0;background:white;border-right:1px solid var(--border);padding:24px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r8);font-size:.875rem;font-weight:600;color:var(--slate);cursor:pointer;transition:all .18s;border:none;background:none;width:100%;text-align:left;font-family:var(--fb)}
.sidebar-item:hover{background:var(--cloud);color:var(--ink)}
.sidebar-item.active{background:var(--brand-soft);color:var(--brand)}
.sidebar-icon{font-size:18px;flex-shrink:0}
.sidebar-badge{margin-left:auto;background:var(--brand);color:white;font-size:.625rem;font-weight:700;padding:2px 7px;border-radius:var(--rfull)}
.dash-main{flex:1;padding:clamp(24px,4vw,40px);min-width:0}

/* ── Stats ── */
.stat-card{background:white;border:1px solid var(--border);border-radius:var(--r18);padding:24px;box-shadow:var(--shadow-xs)}
.stat-num{font-family:var(--fd);font-size:2rem;font-weight:800;line-height:1;margin-bottom:6px}
.stat-label{font-size:.8125rem;color:var(--mist);font-weight:500}
.stat-change{font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:4px;margin-top:8px}
.stat-up{color:#16a34a}.stat-down{color:#dc2626}

/* ── Notifications panel ── */
.notif-panel{position:absolute;top:calc(100% + 12px);right:0;width:360px;background:white;border-radius:var(--r18);box-shadow:var(--shadow-xl);border:1px solid var(--border);overflow:hidden;z-index:300;display:none}
.notif-panel.open{display:block;animation:fadeIn .2s ease}
.notif-item{display:flex;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s}
.notif-item:hover{background:var(--cloud)}
.notif-item.unread{background:var(--brand-soft)}
.notif-item:last-child{border-bottom:none}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 24px}
.empty-icon{font-size:3.5rem;margin-bottom:16px}
.empty-title{font-family:var(--fd);font-size:1.25rem;font-weight:700;margin-bottom:8px;color:var(--ink)}
.empty-desc{color:var(--mist);font-size:.875rem;max-width:320px;margin:0 auto 24px}

/* ── Misc helpers ── */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
.spinner.dark{border-color:rgba(0,0,0,.1);border-top-color:var(--brand)}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:20px 0}
.skeleton{background:linear-gradient(90deg,var(--cloud) 25%,#e8eaf0 50%,var(--cloud) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r8)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.text-brand{color:var(--brand)} .text-muted{color:var(--mist)} .text-sm{font-size:.8125rem} .text-xs{font-size:.75rem}
.font-display{font-family:var(--fd)} .font-bold{font-weight:700} .fw-600{font-weight:600}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mt-32{margin-top:32px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.gap-20{gap:20px}.gap-24{gap:24px}
.flex{display:flex}.flex-col{display:flex;flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.wrap{flex-wrap:wrap}.w-full{width:100%}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}

/* ── Map ── */
.map-dark{background:var(--ink);border-radius:var(--r28);overflow:hidden;position:relative;min-height:400px}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px}
.map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:2}

.pin-card{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:white;border-radius:var(--r12);padding:12px;width:180px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s;font-size:.75rem;border:1px solid var(--border)}

/* ── Filter bar ── */

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// js/config.js — Supabase client + all DB/Auth/Realtime helpers

// ── REPLACE WITH YOUR SUPABASE CREDENTIALS ────────────────
const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_KEY';
// ──────────────────────────────────────────────────────────

const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── AUTH ─────────────────────────────────────────────────
const Auth = {
  async signUp({ email, password, name, location, role }) {
    const { data, error } = await _sb.auth.signUp({
      email, password,
      options: { data: { name, location, role } }
    });
    if (error) throw error;
    return data;
  },
  async signIn({ email, password }) {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  },
  async signOut() {
    await _sb.auth.signOut();
    window.location.href = 'index.html';
  },
  async getUser() {
    const { data: { user } } = await _sb.auth.getUser();
    return user;
  },
  async getSession() {
    const { data: { session } } = await _sb.auth.getSession();
    return session;
  },
  onAuthChange(cb) {
    return _sb.auth.onAuthStateChange(cb);
  },
  async requireAuth() {
    const s = await this.getSession();
    if (!s) { window.location.href = 'login.html'; return null; }
    return s.user;
  },
  async redirectIfAuth() {
    const s = await this.getSession();
    if (s) window.location.href = 'dashboard.html';
  }
};

// ── DB ────────────────────────────────────────────────────
const DB = {
  // Profiles
  async getProfile(id) {
    const { data, error } = await _sb.from('profiles').select('*').eq('id', id).single();
    if (error) throw error; return data;
  },
  async updateProfile(id, updates) {
    const { data, error } = await _sb.from('profiles').update(updates).eq('id', id).select().single();
    if (error) throw error; return data;
  },
  async getTaskers({ search, limit = 24 } = {}) {
    let q = _sb.from('profiles').select('*').eq('role', 'tasker').eq('banned', false).order('rating', { ascending: false });
    if (search) q = q.ilike('name', `%${search}%`);
    q = q.limit(limit);
    const { data, error } = await q;
    if (error) throw error; return data;
  },

  // Tasks
  async createTask(task) {
    const { data, error } = await _sb.from('tasks').insert(task).select().single();
    if (error) throw error; return data;
  },
  async getTasks({ category, status, search, limit = 30, offset = 0 } = {}) {
    let q = _sb.from('tasks')
      .select('*, poster:created_by(id,name,avatar_url,rating,location)')
      .order('created_at', { ascending: false });
    if (category && category !== 'All') q = q.eq('category', category);
    if (status) q = q.eq('status', status);
    if (search) q = q.ilike('title', `%${search}%`);
    q = q.range(offset, offset + limit - 1);
    const { data, error } = await q;
    if (error) throw error; return data;
  },
  async getTask(id) {
    const { data, error } = await _sb.from('tasks')
      .select('*, poster:created_by(id,name,avatar_url,rating,jobs_completed,location,bio), assignee:assigned_to(id,name,avatar_url,rating)')
      .eq('id', id).single();
    if (error) throw error;
    await _sb.from('tasks').update({ views: (data.views || 0) + 1 }).eq('id', id);
    return data;
  },
  async getMyTasks(userId) {
    const { data, error } = await _sb.from('tasks')
      .select('*, applicants:applications(count)').eq('created_by', userId)
      .order('created_at', { ascending: false });
    if (error) throw error; return data;
  },
  async getMyAssignedTasks(userId) {
    const { data, error } = await _sb.from('tasks')
      .select('*, poster:created_by(id,name,avatar_url)').eq('assigned_to', userId)
      .order('created_at', { ascending: false });
    if (error) throw error; return data;
  },
  async updateTask(id, updates) {
    const { data, error } = await _sb.from('tasks').update(updates).eq('id', id).select().single();
    if (error) throw error; return data;
  },
  async deleteTask(id) {
    const { error } = await _sb.from('tasks').delete().eq('id', id);
    if (error) throw error;
  },

  // Applications
  async apply({ taskId, taskerId, offerPrice, message }) {
    const { data, error } = await _sb.from('applications')
      .insert({ task_id: taskId, tasker_id: taskerId, offer_price: offerPrice, message, status: 'pending' })
      .select().single();
    if (error) throw error;
    const task = await this.getTask(taskId);
    await this.notify({ userId: task.created_by, type: 'application', title: 'New application!', body: `Someone applied for "${task.title}"`, link: `task-details.html?id=${taskId}` });
    return data;
  },
  async getApplications(taskId) {
    const { data, error } = await _sb.from('applications')
      .select('*, tasker:tasker_id(id,name,avatar_url,rating,jobs_completed,bio,skills)')
      .eq('task_id', taskId).order('created_at', { ascending: false });
    if (error) throw error; return data;
  },
  async getMyApplications(taskerId) {
    const { data, error } = await _sb.from('applications')
      .select('*, task:task_id(id,title,budget,status,category,location,created_at)')
      .eq('tasker_id', taskerId).order('created_at', { ascending: false });
    if (error) throw error; return data;
  },
  async hasApplied(taskId, taskerId) {
    const { data } = await _sb.from('applications').select('id').eq('task_id', taskId).eq('tasker_id', taskerId).single();
    return !!data;
  },
  async acceptApplication(appId, taskId, taskerId) {
    await _sb.from('applications').update({ status: 'accepted' }).eq('id', appId);
    await _sb.from('applications').update({ status: 'rejected' }).eq('task_id', taskId).neq('id', appId);
    await this.updateTask(taskId, { status: 'assigned', assigned_to: taskerId });
    await this.notify({ userId: taskerId, type: 'accepted', title: 'You got hired! 🎉', body: 'Your application was accepted.', link: `task-details.html?id=${taskId}` });
  },

  // Messages
  async sendMessage({ taskId, senderId, receiverId, message }) {
    const { data, error } = await _sb.from('messages')
      .insert({ task_id: taskId, sender_id: senderId, receiver_id: receiverId, message })
      .select().single();
    if (error) throw error;
    await this.notify({ userId: receiverId, type: 'message', title: 'New message', body: message.substring(0, 60), link: `task-details.html?id=${taskId}` });
    return data;
  },
  async getMessages(taskId) {
    const { data, error } = await _sb.from('messages')
      .select('*, sender:sender_id(name,avatar_url)')
      .eq('task_id', taskId).order('created_at', { ascending: true });
    if (error) throw error; return data;
  },
  subscribeMessages(taskId, cb) {
    return _sb.channel(`chat-${taskId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `task_id=eq.${taskId}` }, cb)
      .subscribe();
  },

  // Reviews
  async submitReview({ taskId, reviewerId, revieweeId, rating, comment }) {
    const { data, error } = await _sb.from('reviews')
      .insert({ task_id: taskId, reviewer_id: reviewerId, reviewee_id: revieweeId, rating, comment })
      .select().single();
    if (error) throw error;
    await this.notify({ userId: revieweeId, type: 'review', title: 'New review!', body: `You received a ${rating}★ review.`, link: `profile.html?id=${revieweeId}` });
    return data;
  },
  async getReviews(userId) {
    const { data, error } = await _sb.from('reviews')
      .select('*, reviewer:reviewer_id(name,avatar_url)')
      .eq('reviewee_id', userId).order('created_at', { ascending: false });
    if (error) throw error; return data;
  },
  async hasReviewed(taskId, reviewerId) {
    const { data } = await _sb.from('reviews').select('id').eq('task_id', taskId).eq('reviewer_id', reviewerId).single();
    return !!data;
  },

  // Notifications
  async notify({ userId, type, title, body, link = '' }) {
    await _sb.from('notifications').insert({ user_id: userId, type, title, body, link, read: false });
  },
  async getNotifs(userId) {
    const { data, error } = await _sb.from('notifications').select('*').eq('user_id', userId).order('created_at', { ascending: false }).limit(30);
    if (error) throw error; return data;
  },
  async markNotifsRead(userId) {
    await _sb.from('notifications').update({ read: true }).eq('user_id', userId).eq('read', false);
  },
  subscribeNotifs(userId, cb) {
    return _sb.channel(`notifs-${userId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${userId}` }, cb)
      .subscribe();
  },

  // Storage
  async uploadAvatar(userId, file) {
    const ext = file.name.split('.').pop();
    const path = `${userId}.${ext}`;
    const { error } = await _sb.storage.from('avatars').upload(path, file, { upsert: true });
    if (error) throw error;
    const { data } = _sb.storage.from('avatars').getPublicUrl(path);
    await this.updateProfile(userId, { avatar_url: data.publicUrl });
    return data.publicUrl;
  },
  async uploadTaskPhoto(file) {
    const path = `${Date.now()}-${file.name}`;
    const { error } = await _sb.storage.from('task-photos').upload(path, file);
    if (error) throw error;
    const { data } = _sb.storage.from('task-photos').getPublicUrl(path);
    return data.publicUrl;
  },

  // Admin
  async adminUsers(limit = 50) {
    const { data, error } = await _sb.from('profiles').select('*').order('created_at', { ascending: false }).limit(limit);
    if (error) throw error; return data;
  },
  async adminTasks(limit = 50) {
    const { data, error } = await _sb.from('tasks').select('*, poster:created_by(name)').order('created_at', { ascending: false }).limit(limit);
    if (error) throw error; return data;
  },
  async adminBan(userId) {
    const { error } = await _sb.from('profiles').update({ banned: true }).eq('id', userId);
    if (error) throw error;
  },
  async adminUnban(userId) {
    const { error } = await _sb.from('profiles').update({ banned: false }).eq('id', userId);
    if (error) throw error;
  },
  async adminDeleteTask(id) {
    const { error } = await _sb.from('tasks').delete().eq('id', id);
    if (error) throw error;
  },
  async adminStats() {
    const [users, tasks, reviews] = await Promise.all([
      _sb.from('profiles').select('id', { count: 'exact', head: true }),
      _sb.from('tasks').select('id', { count: 'exact', head: true }),
      _sb.from('reviews').select('id', { count: 'exact', head: true })
    ]);
    return { users: users.count, tasks: tasks.count, reviews: reviews.count };
  }
};

// ── UTILS ─────────────────────────────────────────────────
const Utils = {
  fmt(n) { return '₦' + Number(n || 0).toLocaleString('en-NG'); },
  timeAgo(d) {
    const diff = (Date.now() - new Date(d)) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return new Date(d).toLocaleDateString('en-NG', { day: 'numeric', month: 'short' });
  },
  initials(n = '') { return n.split(' ').map(w => w[0] || '').join('').substring(0, 2).toUpperCase() || '??'; },
  stars(r = 0) { const f = Math.round(r); return '★'.repeat(f) + '☆'.repeat(5 - f); },
  avatar(p, size = 'md') {
    if (p?.avatar_url) return `<img src="${p.avatar_url}" class="avatar avatar-${size}" alt="${p?.name || ''}">`;
    return `<div class="avatar avatar-${size}">${this.initials(p?.name)}</div>`;
  },
  statusBadge(s) {
    const map = { open: 'badge-open', assigned: 'badge-assigned', in_progress: 'badge-in_progress', completed: 'badge-completed', cancelled: 'badge-cancelled' };
    return `<span class="badge ${map[s] || 'badge-gray'}">${(s || '').replace('_', ' ')}</span>`;
  },
  qs(p) {
    const params = new URLSearchParams(window.location.search);
    return params.get(p);
  },
  sanitize(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
};

// ── TOAST ─────────────────────────────────────────────────
const Toast = {
  _c: null,
  _get() {
    if (!this._c) {
      this._c = document.createElement('div');
      this._c.className = 'toast-container';
      document.body.appendChild(this._c);
    }
    return this._c;
  },
  show(msg, type = 'info', ms = 4000) {
    const icons = { success: '✅', error: '❌', info: '⚡' };
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${icons[type] || '💬'}</span><span>${msg}</span>`;
    this._get().appendChild(t);
    setTimeout(() => { t.style.cssText = 'opacity:0;transform:translateX(20px);transition:.3s'; setTimeout(() => t.remove(), 300); }, ms);
  },
  success(m) { this.show(m, 'success'); },
  error(m)   { this.show(m, 'error'); },
  info(m)    { this.show(m, 'info'); }
};

window._sb   = _sb;
window.Auth  = Auth;
window.DB    = DB;
window.Utils = Utils;
window.Toast = Toast;

</script>
<script>
let task = null, currentUser = null, currentProfile = null, rating = 0, chatChannel = null;

const taskId = Utils.qs('id');
if (!taskId) window.location.href = 'browse-tasks.html';

async function init() {
  currentUser = await Auth.getUser();
  if (currentUser) currentProfile = await DB.getProfile(currentUser.id).catch(() => null);

  const navEl = document.getElementById('navActions');
  if (currentUser) {
    navEl.innerHTML = `<div class="nav-user" onclick="window.location.href='dashboard.html'">${Utils.avatar(currentProfile,'xs')}<span class="nav-user-name">${currentProfile?.name||'Me'}</span></div>`;
  } else {
    navEl.innerHTML = `<a href="login.html" class="btn btn-outline btn-sm">Sign in</a><a href="signup.html" class="btn btn-brand btn-sm">Get started</a>`;
  }

  await loadTask();
}

async function loadTask() {
  try {
    task = await DB.getTask(taskId);
    renderTask();
  } catch(e) {
    document.getElementById('pageContent').innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">❌</div><h3 class="empty-title">Task not found</h3><p class="empty-desc">This task may have been removed.</p><a href="browse-tasks.html" class="btn btn-brand">Browse Tasks</a></div></div>`;
  }
}

function renderTask() {
  const isOwner = currentUser?.id === task.created_by;
  const isAssignee = currentUser?.id === task.assigned_to;
  const canApply = currentUser && !isOwner && task.status === 'open';
  const canChat = currentUser && (isOwner || isAssignee) && task.status !== 'open';
  const canReview = isOwner && task.status === 'assigned' || task.status === 'in_progress';
  const canMarkDone = isAssignee && task.status === 'in_progress';
  const canMarkProgress = isOwner && task.status === 'assigned';

  document.getElementById('pageContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start">
      <!-- Main -->
      <div>
        <div class="card" style="margin-bottom:20px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px">
            <div>
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
                ${Utils.statusBadge(task.status)}
                <span class="badge badge-gray">${Utils.sanitize(task.category)}</span>
                ${task.poster?.verified ? '<span class="badge badge-teal">✓ Verified Poster</span>' : ''}
              </div>
              <h1 style="font-size:clamp(1.25rem,2.5vw,1.75rem)">${Utils.sanitize(task.title)}</h1>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:var(--fd);font-size:1.75rem;font-weight:800;color:var(--brand)">${Utils.fmt(task.budget)}</div>
              <div style="font-size:.8125rem;color:var(--mist)">Budget</div>
            </div>
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
            <span style="display:flex;align-items:center;gap:6px;font-size:.875rem;color:var(--slate);font-weight:500">📍 ${Utils.sanitize(task.location)}</span>
            <span style="display:flex;align-items:center;gap:6px;font-size:.875rem;color:var(--slate);font-weight:500">🕐 Posted ${Utils.timeAgo(task.created_at)}</span>
            ${task.deadline ? `<span style="display:flex;align-items:center;gap:6px;font-size:.875rem;color:var(--slate);font-weight:500">📅 Deadline: ${new Date(task.deadline).toLocaleDateString('en-NG',{day:'numeric',month:'long',year:'numeric'})}</span>` : ''}
            <span style="display:flex;align-items:center;gap:6px;font-size:.875rem;color:var(--slate);font-weight:500">👁️ ${task.views || 0} views</span>
          </div>
          <h4 style="margin-bottom:8px">Description</h4>
          <p style="line-height:1.8;white-space:pre-wrap">${Utils.sanitize(task.description)}</p>
          ${task.photos?.length ? `<div style="margin-top:16px"><h4 style="margin-bottom:10px">Photos</h4><div style="display:flex;gap:10px;flex-wrap:wrap">${task.photos.map(p=>`<img src="${p}" style="width:120px;height:90px;object-fit:cover;border-radius:10px;cursor:pointer" onclick="window.open('${p}','_blank')">`).join('')}</div></div>` : ''}
        </div>

        <!-- Applications (owner sees) -->
        ${isOwner ? `<div class="card" style="margin-bottom:20px" id="applicationsPanel">
          <h3 style="margin-bottom:16px">Applications</h3>
          <div id="appsList"><div class="card skeleton" style="height:80px"></div></div>
        </div>` : ''}

        <!-- Chat (owner & assignee) -->
        ${canChat || (isOwner && task.assigned_to) ? `<div class="card" id="chatPanel" style="margin-bottom:20px">
          <h3 style="margin-bottom:16px">Chat with ${isOwner ? (task.assignee?.name || 'Tasker') : (task.poster?.name || 'Customer')}</h3>
          <div class="chat-wrap">
            <div class="chat-messages" id="chatMessages"><div style="text-align:center;color:var(--mist);font-size:.875rem;padding:20px">No messages yet. Say hello!</div></div>
            <div class="chat-input-bar">
              <textarea class="chat-input" id="chatInput" placeholder="Type a message…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
              <button class="btn btn-brand btn-icon" onclick="sendMessage()">➤</button>
            </div>
          </div>
        </div>` : ''}

        <!-- Task status actions -->
        ${canMarkProgress ? `<div class="card" style="background:var(--teal-soft);border-color:var(--teal);margin-bottom:20px"><p style="margin-bottom:12px;font-weight:500;color:var(--ink)">Ready to start? Mark the task as In Progress.</p><button class="btn btn-teal" onclick="updateStatus('in_progress')">Start Task →</button></div>` : ''}
        ${canMarkDone ? `<div class="card" style="background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);margin-bottom:20px"><p style="margin-bottom:12px;font-weight:500;color:var(--ink)">All done? Mark the task as completed.</p><button class="btn btn-green" onclick="updateStatus('completed')">Mark as Completed ✓</button></div>` : ''}
        ${isOwner && task.status === 'completed' && !task._reviewed ? `<div class="card" style="background:var(--brand-soft);border-color:var(--brand);margin-bottom:20px"><p style="margin-bottom:12px;font-weight:500;color:var(--ink)">How was the job? Leave a review for your tasker.</p><button class="btn btn-brand" onclick="openReview()">Leave a Review ★</button></div>` : ''}
      </div>

      <!-- Sidebar -->
      <div style="position:sticky;top:calc(var(--nav-h)+20px);display:flex;flex-direction:column;gap:16px">
        <!-- Poster info -->
        <div class="card">
          <h4 style="margin-bottom:14px">Posted by</h4>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <a href="profile.html?id=${task.poster?.id}" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
              ${Utils.avatar(task.poster,'md')}
              <div>
                <div style="font-weight:700">${Utils.sanitize(task.poster?.name || 'Unknown')}</div>
                <div class="stars" style="font-size:.75rem">${Utils.stars(task.poster?.rating)}</div>
              </div>
            </a>
          </div>
          <div style="font-size:.8125rem;color:var(--mist)">📍 ${Utils.sanitize(task.poster?.location || 'Nigeria')}</div>
          <div style="font-size:.8125rem;color:var(--mist);margin-top:4px">✅ ${task.poster?.jobs_completed || 0} tasks posted</div>
        </div>

        <!-- Apply / status card -->
        <div class="card">
          ${canApply ? `
            <h4 style="margin-bottom:10px">Interested in this task?</h4>
            <p style="font-size:.875rem;margin-bottom:16px">Submit your offer and a short message to the customer.</p>
            <button class="btn btn-brand btn-full btn-lg" onclick="openApply()">Apply for Task →</button>
          ` : isOwner ? `
            <div style="font-size:.875rem;font-weight:600;color:var(--slate)">📋 This is your task</div>
            <a href="dashboard.html" class="btn btn-outline btn-full btn-sm" style="margin-top:12px">Manage in Dashboard</a>
            ${task.status === 'open' ? `<button class="btn btn-danger btn-full btn-sm" style="margin-top:8px" onclick="cancelTask()">Cancel Task</button>` : ''}
          ` : isAssignee ? `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:20px">🎉</span><div style="font-weight:700">You're assigned!</div></div>
            <p style="font-size:.875rem;color:var(--mist)">Coordinate with the customer and complete the task.</p>
          ` : !currentUser ? `
            <h4 style="margin-bottom:10px">Want to apply?</h4>
            <a href="login.html?redirect=${encodeURIComponent(window.location.href)}" class="btn btn-brand btn-full btn-lg">Sign in to apply</a>
          ` : `
            <div class="badge badge-gray" style="width:100%;justify-content:center;padding:12px">${Utils.statusBadge(task.status)}</div>
          `}
        </div>

        <!-- Assignee (if any) -->
        ${task.assignee ? `<div class="card">
          <h4 style="margin-bottom:14px">Assigned Tasker</h4>
          <a href="profile.html?id=${task.assignee.id}" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
            ${Utils.avatar(task.assignee,'md')}
            <div>
              <div style="font-weight:700">${Utils.sanitize(task.assignee.name)}</div>
              <div class="stars" style="font-size:.75rem">${Utils.stars(task.assignee.rating)}</div>
            </div>
          </a>
        </div>` : ''}
      </div>
    </div>`;

  if (isOwner) loadApplications();
  if (canChat || (isOwner && task.assigned_to)) { loadMessages(); subscribeChat(); }
}

async function loadApplications() {
  try {
    const apps = await DB.getApplications(taskId);
    const el = document.getElementById('appsList');
    if (!apps.length) { el.innerHTML = '<p style="color:var(--mist);text-align:center;padding:20px">No applications yet. Share your task to get more visibility!</p>'; return; }
    el.innerHTML = apps.map(a => `
      <div style="display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);align-items:flex-start" id="app-${a.id}">
        <a href="profile.html?id=${a.tasker?.id}">${Utils.avatar(a.tasker,'md')}</a>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">
            <div>
              <a href="profile.html?id=${a.tasker?.id}" style="font-weight:700;text-decoration:none;color:var(--ink)">${Utils.sanitize(a.tasker?.name||'Tasker')}</a>
              <span style="color:var(--mist);font-size:.8125rem;margin-left:8px">${Utils.sanitize(a.tasker?.location||'')}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-family:var(--fd);font-size:1.125rem;font-weight:800;color:var(--brand)">${Utils.fmt(a.offer_price)}</span>
              ${Utils.statusBadge(a.status)}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span class="stars" style="font-size:.75rem">${Utils.stars(a.tasker?.rating)}</span>
            <span style="font-size:.75rem;color:var(--mist)">${a.tasker?.jobs_completed||0} jobs</span>
          </div>
          <p style="font-size:.875rem;color:var(--slate);line-height:1.6">${Utils.sanitize(a.message)}</p>
          ${a.status === 'pending' && task.status === 'open' ? `
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="btn btn-brand btn-sm" onclick="acceptApp('${a.id}','${a.tasker_id}')">✓ Accept</button>
              <a href="profile.html?id=${a.tasker?.id}" class="btn btn-outline btn-sm">View Profile</a>
            </div>` : ''}
        </div>
      </div>`).join('');
  } catch(e) { document.getElementById('appsList').innerHTML = '<p>Error loading applications.</p>'; }
}

async function acceptApp(appId, taskerId) {
  if (!confirm('Accept this tasker for your task?')) return;
  try {
    await DB.acceptApplication(appId, taskId, taskerId);
    Toast.success('Tasker accepted! 🎉');
    await loadTask();
  } catch(e) { Toast.error('Failed to accept. Please try again.'); }
}

async function loadMessages() {
  try {
    const msgs = await DB.getMessages(taskId);
    renderMessages(msgs);
  } catch(e) {}
}

function renderMessages(msgs) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  if (!msgs.length) return;
  el.innerHTML = msgs.map(m => {
    const sent = m.sender_id === currentUser?.id;
    return `<div class="chat-bubble ${sent?'sent':'received'}">
      <div>${Utils.sanitize(m.message)}</div>
      <div class="chat-meta">${Utils.timeAgo(m.created_at)}${!sent ? ` · ${Utils.sanitize(m.sender?.name||'')}` : ''}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function subscribeChat() {
  if (chatChannel) _sb.removeChannel(chatChannel);
  chatChannel = DB.subscribeMessages(taskId, payload => {
    const msg = payload.new;
    const el = document.getElementById('chatMessages');
    if (!el) return;
    const sent = msg.sender_id === currentUser?.id;
    const div = document.createElement('div');
    div.className = `chat-bubble ${sent?'sent':'received'}`;
    div.innerHTML = `<div>${Utils.sanitize(msg.message)}</div><div class="chat-meta">${Utils.timeAgo(msg.created_at)}</div>`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  });
}

async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg || !currentUser) return;
  inp.value = '';
  const otherId = currentUser.id === task.created_by ? task.assigned_to : task.created_by;
  if (!otherId) return;
  try {
    await DB.sendMessage({ taskId, senderId: currentUser.id, receiverId: otherId, message: msg });
  } catch(e) { Toast.error('Failed to send message.'); }
}

// Apply modal
function openApply() {
  if (!currentUser) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
  document.getElementById('budgetHint').textContent = `Task budget: ${Utils.fmt(task.budget)}`;
  document.getElementById('applyModal').classList.add('open');
}
function closeApply() { document.getElementById('applyModal').classList.remove('open'); }

async function submitApplication() {
  const price = parseFloat(document.getElementById('offerPrice').value);
  const msg = document.getElementById('applyMsg').value.trim();
  if (!price || price < 1) { Toast.error('Please enter a valid price.'); return; }
  if (msg.length < 10) { Toast.error('Please write at least a short message.'); return; }
  const btn = document.getElementById('applySubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Submitting…';
  try {
    await DB.apply({ taskId, taskerId: currentUser.id, offerPrice: price, message: msg });
    closeApply();
    Toast.success('Application submitted! 🎉');
    setTimeout(() => window.location.reload(), 1000);
  } catch(e) {
    Toast.error(e.message?.includes('duplicate') ? 'You already applied for this task.' : 'Failed to apply.');
    btn.disabled = false; btn.textContent = 'Submit Application';
  }
}

// Review
function openReview() { document.getElementById('reviewModal').classList.add('open'); }
function closeReview() { document.getElementById('reviewModal').classList.remove('open'); }
function setRating(r) {
  rating = r;
  document.querySelectorAll('#starPicker span').forEach((s, i) => { s.textContent = i < r ? '★' : '☆'; s.style.color = i < r ? 'var(--amber)' : 'var(--mist)'; });
}
async function submitReview() {
  if (!rating) { Toast.error('Please select a rating.'); return; }
  const btn = document.getElementById('reviewSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Submitting…';
  try {
    await DB.submitReview({ taskId, reviewerId: currentUser.id, revieweeId: task.assigned_to, rating, comment: document.getElementById('reviewComment').value.trim() });
    closeReview();
    Toast.success('Review submitted! Thanks for your feedback.');
    setTimeout(() => window.location.reload(), 1000);
  } catch(e) {
    Toast.error(e.message?.includes('duplicate') ? 'You already reviewed this task.' : 'Failed to submit review.');
    btn.disabled = false; btn.textContent = 'Submit Review';
  }
}

async function updateStatus(status) {
  try {
    await DB.updateTask(taskId, { status });
    Toast.success(`Task marked as ${status.replace('_',' ')}`);
    setTimeout(() => window.location.reload(), 800);
  } catch(e) { Toast.error('Failed to update status.'); }
}

async function cancelTask() {
  if (!confirm('Are you sure you want to cancel this task?')) return;
  try {
    await DB.updateTask(taskId, { status: 'cancelled' });
    Toast.info('Task cancelled.');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch(e) { Toast.error('Failed to cancel task.'); }
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

init();
</script>
</body>
</html>
