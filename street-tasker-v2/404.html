<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Street Tasker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:#0A0F1E;min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center;padding:24px;}
    .wrap{max-width:480px;}
    .logo{font-family:'Poppins',serif;font-size:22px;margin-bottom:52px;display:flex;align-items:center;justify-content:center;gap:10px;}
    .logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#FF6B35,#FF9A56);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .logo span{color:#FF6B35;}
    .num{font-family:'Poppins',serif;font-size:120px;font-weight:700;line-height:1;background:linear-gradient(135deg,#FF6B35,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
    h1{font-family:'Poppins',serif;font-size:32px;margin-bottom:12px;}
    p{color:rgba(255,255,255,.55);font-size:16px;line-height:1.6;margin-bottom:36px;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#FF6B35;color:white;border-radius:12px;font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;text-decoration:none;transition:all .2s;}
    .btn:hover{background:#E8531E;transform:translateY(-2px);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      Street<span>Tasker</span>
    </div>
    <div class="num">404</div>
    <h1>Page not found</h1>
    <p>Looks like this tasker took a wrong turn. The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn">← Back to Street Tasker</a>
  </div>
</body>
</html>
