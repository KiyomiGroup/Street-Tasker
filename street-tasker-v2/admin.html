<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Street Tasker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="navbar-inner">
  <a href="index.html" class="nav-logo"><div class="nav-logo-mark">⚡</div>Street<span>Tasker</span> <span style="font-size:.75rem;font-weight:700;background:var(--red);color:white;padding:3px 8px;border-radius:4px;margin-left:4px">ADMIN</span></a>
  <div class="nav-actions"><button class="btn btn-ghost btn-sm" onclick="Auth.signOut()">Sign out</button></div>
</div></nav>

<div class="page-wrap">
  <div class="dash-layout">
    <aside class="dash-sidebar">
      <div style="padding:0 8px 16px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mist)">Admin Panel</div>
      <button class="sidebar-item active" id="sb-overview" onclick="showTab('overview')"><span class="sidebar-icon">📊</span>Overview</button>
      <button class="sidebar-item" id="sb-users" onclick="showTab('users')"><span class="sidebar-icon">👥</span>Users</button>
      <button class="sidebar-item" id="sb-tasks" onclick="showTab('tasks')"><span class="sidebar-icon">📋</span>Tasks</button>
      <div style="margin-top:auto;padding-top:20px;border-top:1px solid var(--border)">
        <a href="dashboard.html" class="sidebar-item">← User Dashboard</a>
      </div>
    </aside>

    <main class="dash-main">
      <!-- OVERVIEW -->
      <div id="tab-overview" class="tab-content">
        <h2 style="margin-bottom:24px">Platform Overview</h2>
        <div class="grid-4" id="adminStats">
          <div class="stat-card skeleton" style="height:100px"></div>
          <div class="stat-card skeleton" style="height:100px"></div>
          <div class="stat-card skeleton" style="height:100px"></div>
          <div class="stat-card skeleton" style="height:100px"></div>
        </div>
      </div>

      <!-- USERS -->
      <div id="tab-users" class="tab-content" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
          <h2>All Users</h2>
          <input type="text" class="form-input" placeholder="Search users…" style="max-width:240px" id="userSearch" oninput="filterUsers()">
        </div>
        <div class="table-wrap">
          <table class="admin-table" id="usersTable">
            <thead><tr><th>User</th><th>Role</th><th>Location</th><th>Rating</th><th>Jobs</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="usersBody">
              <tr><td colspan="7"><div class="skeleton" style="height:40px;margin:8px"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- TASKS -->
      <div id="tab-tasks" class="tab-content" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
          <h2>All Tasks</h2>
          <div style="display:flex;gap:10px">
            <input type="text" class="form-input" placeholder="Search tasks…" style="max-width:200px" id="taskSearch" oninput="filterTasks()">
            <select class="form-input" style="max-width:140px" id="taskStatusFilter" onchange="filterTasks()">
              <option value="">All statuses</option>
              <option value="open">Open</option>
              <option value="assigned">Assigned</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table class="admin-table" id="tasksTable">
            <thead><tr><th>Task</th><th>Category</th><th>Budget</th><th>Location</th><th>Status</th><th>Posted by</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="tasksBody">
              <tr><td colspan="8"><div class="skeleton" style="height:40px;margin:8px"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
let allUsers = [], allTasks = [], currentUser;

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById(`tab-${name}`).style.display = 'block';
  document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
  document.getElementById(`sb-${name}`).classList.add('active');
  if (name === 'users') loadUsers();
  if (name === 'tasks') loadAdminTasks();
  if (name === 'overview') loadAdminStats();
}

async function init() {
  currentUser = await Auth.requireAuth();
  if (!currentUser) return;
  const profile = await DB.getProfile(currentUser.id).catch(() => null);
  if (profile?.role !== 'admin') {
    document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div style="font-size:48px">🚫</div><h2>Admin access required</h2><p style="color:var(--mist)">You don't have permission to view this page.</p><a href="dashboard.html" class="btn btn-brand">← Go to Dashboard</a></div>`;
    return;
  }
  loadAdminStats();
}

async function loadAdminStats() {
  try {
    const stats = await DB.adminStats();
    const open = await _sb.from('tasks').select('id', { count: 'exact', head: true }).eq('status', 'open');
    document.getElementById('adminStats').innerHTML = [
      { num: stats.users, label: 'Total Users', icon: '👥', color: 'var(--brand-soft)', nc: 'var(--brand)' },
      { num: stats.tasks, label: 'Total Tasks', icon: '📋', color: 'var(--teal-soft)', nc: 'var(--teal)' },
      { num: open.count, label: 'Open Tasks', icon: '⚡', color: 'rgba(34,197,94,.1)', nc: '#16a34a' },
      { num: stats.reviews, label: 'Reviews', icon: '⭐', color: 'rgba(245,158,11,.1)', nc: '#d97706' },
    ].map(s => `<div class="stat-card" style="background:${s.color};border:none"><div class="stat-num" style="color:${s.nc}">${s.num}</div><div class="stat-label">${s.icon} ${s.label}</div></div>`).join('');
  } catch(e) { document.getElementById('adminStats').innerHTML = '<div class="card"><p>Error loading stats.</p></div>'; }
}

async function loadUsers() {
  try {
    allUsers = await DB.adminUsers(100);
    renderUsers(allUsers);
  } catch(e) { document.getElementById('usersBody').innerHTML = '<tr><td colspan="7">Error loading users</td></tr>'; }
}

function renderUsers(users) {
  document.getElementById('usersBody').innerHTML = users.map(u => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px">${Utils.avatar(u,'xs')}<div><div style="font-weight:600">${Utils.sanitize(u.name)}</div><div style="font-size:.75rem;color:var(--mist)">${Utils.sanitize(u.email)}</div></div></div></td>
      <td><span class="badge ${u.role==='admin'?'badge-red':u.role==='tasker'?'badge-teal':'badge-gray'}" style="text-transform:capitalize">${u.role}</span></td>
      <td>${Utils.sanitize(u.location || '—')}</td>
      <td><span class="stars" style="font-size:.75rem">${Utils.stars(u.rating)}</span> <span style="font-size:.8125rem">${u.rating || 0}</span></td>
      <td>${u.jobs_completed || 0}</td>
      <td>${u.banned ? '<span class="badge badge-red">Banned</span>' : u.verified ? '<span class="badge badge-green">Verified</span>' : '<span class="badge badge-gray">Active</span>'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <a href="profile.html?id=${u.id}" class="btn btn-ghost btn-sm" target="_blank">View</a>
          ${u.banned
            ? `<button class="btn btn-teal btn-sm" onclick="unbanUser('${u.id}')">Unban</button>`
            : `<button class="btn btn-danger btn-sm" onclick="banUser('${u.id}')">Ban</button>`}
          ${!u.verified ? `<button class="btn btn-outline btn-sm" onclick="verifyUser('${u.id}')">Verify</button>` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  renderUsers(allUsers.filter(u => u.name?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q)));
}

async function banUser(id) {
  if (!confirm('Ban this user?')) return;
  try { await DB.adminBan(id); Toast.success('User banned'); loadUsers(); } catch(e) { Toast.error(e.message); }
}
async function unbanUser(id) {
  try { await DB.adminUnban(id); Toast.success('User unbanned'); loadUsers(); } catch(e) { Toast.error(e.message); }
}
async function verifyUser(id) {
  try { await DB.updateProfile(id, { verified: true }); Toast.success('User verified ✓'); loadUsers(); } catch(e) { Toast.error(e.message); }
}

async function loadAdminTasks() {
  try {
    allTasks = await DB.adminTasks(100);
    renderTasks(allTasks);
  } catch(e) { document.getElementById('tasksBody').innerHTML = '<tr><td colspan="8">Error loading tasks</td></tr>'; }
}

function renderTasks(tasks) {
  document.getElementById('tasksBody').innerHTML = tasks.map(t => `
    <tr>
      <td><a href="task-details.html?id=${t.id}" style="font-weight:600;text-decoration:none;color:var(--ink)">${Utils.sanitize(t.title.substring(0,50))}${t.title.length>50?'…':''}</a></td>
      <td><span class="badge badge-gray">${Utils.sanitize(t.category)}</span></td>
      <td style="font-weight:700;color:var(--brand)">${Utils.fmt(t.budget)}</td>
      <td>${Utils.sanitize(t.location)}</td>
      <td>${Utils.statusBadge(t.status)}</td>
      <td>${Utils.sanitize(t.poster?.name || '—')}</td>
      <td style="font-size:.8125rem;color:var(--mist)">${Utils.timeAgo(t.created_at)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <a href="task-details.html?id=${t.id}" class="btn btn-ghost btn-sm">View</a>
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');
}

function filterTasks() {
  const q = document.getElementById('taskSearch').value.toLowerCase();
  const status = document.getElementById('taskStatusFilter').value;
  renderTasks(allTasks.filter(t => {
    const ms = t.title?.toLowerCase().includes(q) || t.category?.toLowerCase().includes(q);
    const mst = !status || t.status === status;
    return ms && mst;
  }));
}

async function deleteTask(id) {
  if (!confirm('Permanently delete this task? This cannot be undone.')) return;
  try { await DB.adminDeleteTask(id); Toast.success('Task deleted'); loadAdminTasks(); } catch(e) { Toast.error(e.message); }
}

init();
</script>
</body>
</html>
