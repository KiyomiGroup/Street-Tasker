// ─── FORMSPREE ────────────────────────────────────────────────────────────────
const FORMSPREE_URL = "https://formspree.io/f/mwvnjrba";
async function submitToFormspree(data) {
  try {
    const res = await fetch(FORMSPREE_URL,{method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},body:JSON.stringify(data)});
    if(res.ok) return {ok:true};
    const json = await res.json().catch(()=>({}));
    return {ok:false,error:json?.errors?.[0]?.message||"Submission failed."};
  } catch { return {ok:false,error:"Network error."}; }
}

  .section-title { font-family:'Fraunces',serif; font-size:clamp(28px,4vw,42px); letter-spacing:-.04em; margin-bottom:10px; }
  .section-sub { color:var(--slate); font-size:16px; max-width:540px; line-height:1.6; }
  .section-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:36px; gap:24px; flex-wrap:wrap; }
  .page-wrap { max-width:var(--page-max); margin:0 auto; padding:0 clamp(20px,4vw,48px); }

  /* ── Auth Page ── */
  .auth-wrap { min-height:calc(100vh - var(--nav-h)); display:flex; align-items:center; justify-content:center; padding:40px 24px; background:var(--bone); }
  .auth-card { max-width:440px; width:100%; }
  .auth-logo { text-align:center; margin-bottom:32px; }
  .auth-box { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-xl); padding:36px; box-shadow:var(--shadow); }

  /* ── Dashboard ── */
  .dash-wrap { max-width:900px; margin:0 auto; padding:48px clamp(20px,4vw,48px); }
  .dash-header { background:var(--ink); border-radius:var(--radius-lg); padding:32px; color:white; margin-bottom:32px; }

  .dash-tab.active { color:var(--orange); border-bottom-color:var(--orange); }
  .dash-tab:hover { color:var(--ink); }

  /* ── Profile Page ── */
  .profile-hero { background:linear-gradient(135deg,var(--ink) 0%,var(--ink-soft) 100%); padding:clamp(36px,5vw,64px) clamp(20px,4vw,48px); }

  .profile-name { font-family:'Fraunces',serif; font-size:clamp(26px,4vw,40px); color:white; margin-bottom:6px; }
  .profile-meta { display:flex; gap:16px; flex-wrap:wrap; font-size:14px; color:rgba(255,255,255,.65); }

  /* ── Search page ── */
  .filter-bar { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 24px; display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; box-shadow:var(--shadow-sm); margin-bottom:32px; }

  .card-grid-3 { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
  .card-grid-4 { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }

  /* ── Empty state ── */
  .empty { text-align:center; padding:80px 24px; color:var(--mist); }
  .empty-icon { font-size:56px; margin-bottom:16px; }

  /* ── Toast ── */
  .toast { position:fixed; bottom:28px; right:28px; padding:14px 22px; border-radius:var(--radius); font-size:14px; font-weight:500; box-shadow:var(--shadow-lg); animation:slideUp .3s ease; z-index:999; max-width:340px; display:flex; align-items:center; gap:10px; }
  .toast.success { background:var(--ink); color:white; }
  .toast.error { background:#EF4444; color:white; }
  @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  /* ── Misc ── */
  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:99px; font-size:11px; font-weight:700; letter-spacing:.3px; }
  .badge-teal { background:var(--teal-soft); color:var(--teal); }
  .badge-orange { background:var(--orange-glow); color:var(--orange); }
  .badge-gray { background:rgba(0,0,0,.06); color:var(--slate); }
  .divider { height:1px; background:var(--border); margin:24px 0; }
  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.35); border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-banner { background:#FEF2F2; color:#DC2626; border:1px solid #FECACA; border-radius:8px; padding:12px 16px; font-size:13px; }
  .success-banner { background:#F0FDF4; color:#16A34A; border:1px solid #BBF7D0; border-radius:8px; padding:12px 16px; font-size:13px; }
  .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-sm); }
  .service-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border); }
  .service-row:last-child { border-bottom:none; }
  .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; }
  .gallery-img { aspect-ratio:1; border-radius:var(--radius-sm); overflow:hidden; background:var(--bone); display:flex; align-items:center; justify-content:center; font-size:32px; cursor:pointer; transition:transform .2s; position:relative; }
  .gallery-img:hover { transform:scale(1.04); }
  .gallery-img .del-btn { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.5); color:white; border:none; border-radius:50%; width:22px; height:22px; font-size:11px; cursor:pointer; display:none; align-items:center; justify-content:center; }
  .gallery-img:hover .del-btn { display:flex; }

  @media (max-width:768px) {
    .bento-grid { grid-template-columns:repeat(2,1fr); }
    .bento-large { grid-column:span 2; }
    .hiw-grid { grid-template-columns:1fr; }
    .hiw-connector { display:none; }
    .footer-top { grid-template-columns:1fr 1fr; }
    .map-inner { flex-direction:column; }
    .map-sidebar { width:100%; }
    .map-pins { min-height:260px; }
    .cta-banner { flex-direction:column; text-align:center; }
    .cta-banner-actions { justify-content:center; }
    .nav-mobile-hide { display:none; }
    .hero-search-wrap { flex-direction:column; }
    .hero-divider { display:none; }
  }
  @media (max-width:480px) {
    .bento-grid { grid-template-columns:1fr; }
    .bento-large,.bento-wide { grid-column:span 1; }
    .footer-top { grid-template-columns:1fr; }
  }
`;

const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

// ─── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage] = useState("home");
  const [user,setUser] = useState(null);
  const [taskers,setTaskers] = useState(TASKERS);
  const [selectedTasker,setSelectedTasker] = useState(null);
  const [searchQuery,setSearchQuery] = useState({service:"",location:""});
  const [authMode,setAuthMode] = useState("login");
  const [toast,setToast] = useState(null);

  const showToast = useCallback((msg,type="success")=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),4000);
  },[]);

  const navigate = (pg,data={}) => {
    if(pg==="profile"&&data.tasker) setSelectedTasker(data.tasker);
    setPage(pg);
    window.scrollTo(0,0);
  };

  const handleSearch = (q) => { setSearchQuery(q); navigate("search"); };
  const handleLogin = (u) => { setUser(u); navigate(u.role==="provider"?"dashboard":"home"); showToast(`Welcome back, ${u.name}! 👋`); };
  const handleRegister = (u) => {
    const newUser = {...u,id:Date.now().toString()};
    setUser(newUser);
    if(u.role==="provider"){
      setTaskers(prev=>[...prev,{id:newUser.id,userId:newUser.id,name:u.name,business:u.businessName||u.name+"'s Business",category:"Barber",location:"",rating:5.0,reviews:0,price:0,emoji:"⭐",grad:"linear-gradient(135deg,var(--orange),var(--teal))",desc:"",services:[],portfolio:[],contactWhatsapp:"",contactPhone:""}]);
      navigate("dashboard");
    } else navigate("home");
    showToast("Welcome to Street Tasker! 🎉");
  };
  const handleUpdateProfile = (updated) => setTaskers(prev=>prev.map(t=>t.userId===user?.id?{...t,...updated}:t));
  const myProfile = taskers.find(t=>t.userId===user?.id);

  return (
    <>
      <style>{STYLES}</style>
      <AuthCtx.Provider value={{user,setUser,myProfile}}>
        <Navbar navigate={navigate}/>
        {page==="home"      && <HomePage navigate={navigate} onSearch={handleSearch} taskers={taskers} showToast={showToast}/>}
        {page==="search"    && <SearchPage navigate={navigate} taskers={taskers} initial={searchQuery}/>}
        {page==="profile"   && <ProfilePage tasker={selectedTasker} navigate={navigate} showToast={showToast}/>}
        {page==="dashboard" && (user?.role==="provider"
          ? <Dashboard navigate={navigate} profile={myProfile} onUpdate={handleUpdateProfile} showToast={showToast}/>
          : <AuthPage mode={authMode} setMode={setAuthMode} onLogin={handleLogin} onRegister={handleRegister} navigate={navigate}/>
        )}
        {page==="auth"      && <AuthPage mode={authMode} setMode={setAuthMode} onLogin={handleLogin} onRegister={handleRegister} navigate={navigate}/>}
        {page==="become"    && <BecomeTaskerPage navigate={navigate} onRegister={handleRegister} showToast={showToast}/>}
      </AuthCtx.Provider>
      {toast && <div className={`toast ${toast.type}`}><span>{toast.type==="success"?"✓":"✕"}</span>{toast.msg}</div>}
    </>
  );
}

// ─── SEARCH PAGE ──────────────────────────────────────────────────────────────
function SearchPage({navigate,taskers,initial}) {
  const [service,setService] = useState(initial.service||"");
  const [location,setLocation] = useState(initial.location||"");
  const [activeFilter,setActiveFilter] = useState(initial.service||"");
  const [sortBy,setSortBy] = useState("rating");
  const [maxPrice,setMaxPrice] = useState("");

  const filtered = taskers.filter(t=>{
    const ms = !activeFilter||t.category.toLowerCase().includes(activeFilter.toLowerCase())||t.business?.toLowerCase().includes(activeFilter.toLowerCase())||t.name.toLowerCase().includes(activeFilter.toLowerCase());
    const ml = !location||t.location.toLowerCase().includes(location.toLowerCase());
    const mp = !maxPrice||t.price<=Number(maxPrice);
    return ms&&ml&&mp;
  }).sort((a,b)=>sortBy==="rating"?b.rating-a.rating:sortBy==="price"?a.price-b.price:b.reviews-a.reviews);

  return (
    <div className="page-wrap" style={{paddingTop:40,paddingBottom:80}}>
      <h1 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(28px,4vw,42px)",marginBottom:4}}>Find a tasker</h1>
      <p style={{color:"var(--mist)",marginBottom:32}}>{filtered.length} tasker{filtered.length!==1?"s":""} found</p>

      <div className="filter-bar">
        <div className="input-wrap" style={{flex:2}}>
          <label className="input-label">Service or name</label>
          <input className="input" placeholder="e.g. barber, plumber..." value={service} onChange={e=>setService(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setActiveFilter(service)}/>
        </div>
        <div className="input-wrap" style={{flex:1}}>
          <label className="input-label">Location</label>
          <input className="input" placeholder="Area or postcode..." value={location} onChange={e=>setLocation(e.target.value)}/>
        </div>
        <div className="input-wrap" style={{minWidth:120}}>
          <label className="input-label">Max price (£/hr)</label>
          <input className="input" type="number" placeholder="Any" value={maxPrice} onChange={e=>setMaxPrice(e.target.value)}/>
        </div>
        <div className="input-wrap" style={{minWidth:130}}>
          <label className="input-label">Sort by</label>
          <select className="input" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="rating">Top rated</option>
            <option value="price">Lowest price</option>
            <option value="reviews">Most reviews</option>
          </select>
        </div>
        <button className="btn btn-orange" onClick={()=>setActiveFilter(service)}>Filter</button>
        <button className="btn btn-ghost" onClick={()=>{setService("");setLocation("");setActiveFilter("");setMaxPrice("");}}>Clear</button>
      </div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:32}}>
        {CATEGORIES.map(cat=>(
          <button key={cat.label} className={`btn btn-sm ${activeFilter===cat.label?"btn-orange":"btn-ghost"}`}
            onClick={()=>{setService(cat.label);setActiveFilter(cat.label);}}>
            {cat.icon} {cat.label}
          </button>
        ))}
      </div>

      {filtered.length===0 ? (
        <div className="empty"><div className="empty-icon">🔍</div><h3 style={{fontFamily:"'Fraunces',serif",marginBottom:8}}>No taskers found</h3><p>Try different filters or clear and start fresh.</p></div>
      ):(
        <div className="card-grid-4">{filtered.map(t=><TaskerCard key={t.id} tasker={t} onClick={()=>navigate("profile",{tasker:t})}/>)}</div>
      )}
    </div>
  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({tasker,navigate,showToast}) {
  const [cf,setCf] = useState({name:"",email:"",message:""});
  const [sending,setSending] = useState(false);
  const [sent,setSent] = useState(false);
  const [cfErrors,setCfErrors] = useState({});

  if(!tasker) return <div className="page-wrap"><p style={{color:"var(--mist)",padding:"60px 0"}}>Tasker not found.</p></div>;

  const validateCf = () => {
    const e={};
    if(!cf.name.trim()) e.name="Name required.";
    if(!/\S+@\S+\.\S+/.test(cf.email)) e.email="Valid email required.";
    if(!cf.message.trim()) e.message="Please write a message.";
    return e;
  };

  const handleWhatsApp = () => {
    submitToFormspree({_subject:`💬 WhatsApp Tap — ${tasker.business||tasker.name}`,form_type:"whatsapp_tap",tasker_name:tasker.business||tasker.name});
    const msg = encodeURIComponent(`Hi ${tasker.business||tasker.name}! I found you on Street Tasker and would like to enquire about your services.`);
    window.open(`https://wa.me/${tasker.contactWhatsapp?.replace(/\D/g,"")}?text=${msg}`,"_blank");
  };

  const handleContact = async () => {
    const e = validateCf();
    if(Object.keys(e).length){setCfErrors(e);return;}
    setSending(true);
    const result = await submitToFormspree({_subject:`📩 Enquiry for ${tasker.business||tasker.name}`,form_type:"contact",tasker_name:tasker.business||tasker.name,...cf});
    setSending(false);
    if(result.ok){setSent(true);showToast("Message sent! The tasker will be in touch. ✓");}
    else setCfErrors({_server:result.error});
  };

  return (
    <>
      <div className="profile-hero">
        <div className="profile-hero-inner">
          <div className="profile-avatar">{tasker.emoji}</div>
          <div className="profile-info">
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
              <span className="badge badge-teal">✓ Verified</span>
              <span className="badge badge-orange">{tasker.category}</span>
            </div>
            <h1 className="profile-name">{tasker.business||tasker.name}</h1>
            <div className="profile-meta">
              <span>📍 {tasker.location}</span>
              <span className="tasker-rating" style={{color:"rgba(255,255,255,.9)"}}>
                <span className="stars">{"★".repeat(Math.round(tasker.rating))}</span>
                {tasker.rating} ({tasker.reviews} reviews)
              </span>
              <span>from £{tasker.price}/hr</span>
            </div>
          </div>
        </div>
      </div>

      <div className="page-wrap" style={{paddingTop:40,paddingBottom:80}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:32,alignItems:"start"}}>
          <div>
            {/* About */}
            <div className="card" style={{marginBottom:24}}>
              <h3 style={{fontFamily:"'Fraunces',serif",fontSize:20,marginBottom:14}}>About</h3>
              <p style={{color:"var(--slate)",lineHeight:1.7}}>{tasker.desc||"No description yet."}</p>
            </div>
            {/* Services */}
            <div className="card" style={{marginBottom:24}}>
              <h3 style={{fontFamily:"'Fraunces',serif",fontSize:20,marginBottom:14}}>Services & Pricing</h3>
              {(tasker.services||[]).length===0?<p style={{color:"var(--mist)"}}>No services listed yet.</p>:
                (tasker.services||[]).map((s,i)=>(
                  <div key={i} className="service-row">
                    <span style={{fontWeight:500}}>{s.name}</span>
                    <span style={{fontWeight:700,color:"var(--orange)"}}>£{s.price}</span>
                  </div>
                ))
              }
            </div>
            {/* Portfolio */}
            {(tasker.portfolio||[]).length>0&&(
              <div className="card">
                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:20,marginBottom:14}}>Portfolio</h3>
                <div className="gallery-grid">
                  {(tasker.portfolio||[]).map((item,i)=>(
                    <div key={i} className="gallery-img">{typeof item==="string"&&item.length<=2?item:<img src={item} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>}</div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Sidebar */}
          <div style={{position:"sticky",top:"calc(var(--nav-h) + 24px)"}}>
            <div className="card" style={{marginBottom:16}}>
              <div style={{textAlign:"center",paddingBottom:20,borderBottom:"1px solid var(--border)",marginBottom:20}}>
                <div style={{fontSize:32,marginBottom:8}}>{tasker.emoji}</div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:18,marginBottom:4}}>{tasker.name}</div>
                <div style={{fontSize:13,color:"var(--mist)"}}>{tasker.category} · {tasker.location}</div>
              </div>
              {tasker.contactWhatsapp&&<button className="btn btn-whatsapp btn-full" style={{marginBottom:10}} onClick={handleWhatsApp}>💬 WhatsApp {tasker.name.split(" ")[0]}</button>}
              {tasker.contactPhone&&<button className="btn btn-ghost btn-full" onClick={()=>window.location.href=`tel:${tasker.contactPhone}`}>📞 Call</button>}
            </div>
            {/* Contact form */}
            <div className="card">
              <h4 style={{fontFamily:"'Fraunces',serif",fontSize:17,marginBottom:16}}>Send an enquiry</h4>
              {sent ? (
                <div className="success-banner">✓ Message sent! They'll be in touch soon.</div>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div className="input-wrap">
                    <label className="input-label">Your name</label>
                    <input className={`input${cfErrors.name?" err":""}`} value={cf.name} onChange={e=>setCf({...cf,name:e.target.value})} placeholder="Full name"/>
                    {cfErrors.name&&<span className="field-err">{cfErrors.name}</span>}
                  </div>
                  <div className="input-wrap">
                    <label className="input-label">Email</label>
                    <input className={`input${cfErrors.email?" err":""}`} value={cf.email} onChange={e=>setCf({...cf,email:e.target.value})} placeholder="you@example.com"/>
                    {cfErrors.email&&<span className="field-err">{cfErrors.email}</span>}
                  </div>
                  <div className="input-wrap">
                    <label className="input-label">Message</label>
                    <textarea className={`input${cfErrors.message?" err":""}`} value={cf.message} onChange={e=>setCf({...cf,message:e.target.value})} placeholder="What do you need?"/>
                    {cfErrors.message&&<span className="field-err">{cfErrors.message}</span>}
                  </div>
                  {cfErrors._server&&<div className="error-banner">{cfErrors._server}</div>}
                  <button className="btn btn-orange btn-full" onClick={handleContact} disabled={sending}>{sending?<><span className="spinner"/> Sending…</>:"Send message"}</button>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function Dashboard({navigate,profile,onUpdate,showToast}) {
  const {user} = useAuth();
  const [tab,setTab] = useState("info");
  const [form,setForm] = useState({businessName:profile?.business||"",category:profile?.category||"Barber",location:profile?.location||"",description:profile?.desc||"",contactWhatsapp:profile?.contactWhatsapp||"",contactPhone:profile?.contactPhone||""});
  const [services,setServices] = useState(profile?.services||[]);
  const [newSvc,setNewSvc] = useState({name:"",price:""});
  const [portfolio,setPortfolio] = useState(profile?.portfolio||[]);
  const [saving,setSaving] = useState(false);

  const saveInfo = async () => {
    setSaving(true);
    const result = await submitToFormspree({_subject:"🏪 Profile Update — "+form.businessName,form_type:"dashboard_update",...form,services:JSON.stringify(services)});
    onUpdate({business:form.businessName,category:form.category,location:form.location,desc:form.description,contactWhatsapp:form.contactWhatsapp,contactPhone:form.contactPhone,services,portfolio});
    setSaving(false);
    if(result.ok) showToast("Profile updated! ✓");
    else showToast("Saved locally (Formspree offline).","error");
  };

  const addService = async () => {
    if(!newSvc.name.trim()||!newSvc.price) return;
    const s = {id:Date.now().toString(),...newSvc,price:Number(newSvc.price)};
    const updated = [...services,s];
    setServices(updated);
    setNewSvc({name:"",price:""});
    await submitToFormspree({_subject:"🔧 New Service — "+newSvc.name,form_type:"add_service",...newSvc});
    showToast(`"${s.name}" added!`);
  };

  return (
    <div className="dash-wrap">
      <div className="dash-header">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,letterSpacing:".6px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",marginBottom:6}}>Provider Dashboard</div>
            <h2 style={{fontFamily:"'Fraunces',serif",color:"white",fontSize:26}}>{form.businessName||user?.name+"'s Business"}</h2>
          </div>
          <button className="btn btn-ghost" style={{color:"rgba(255,255,255,.7)",borderColor:"rgba(255,255,255,.2)"}} onClick={()=>navigate("home")}>← Back to home</button>
        </div>
      </div>

      <div className="dash-tabs">
        {[["info","🏪 Business Info"],["services","🔧 Services"],["portfolio","🖼️ Portfolio"]].map(([t,label])=>(
          <button key={t} className={`dash-tab${tab===t?" active":""}`} onClick={()=>setTab(t)}>{label}</button>
        ))}
      </div>

      {tab==="info"&&(
        <div style={{maxWidth:580,display:"flex",flexDirection:"column",gap:16}}>
          <div className="input-wrap"><label className="input-label">Business Name</label><input className="input" value={form.businessName} onChange={e=>setForm({...form,businessName:e.target.value})} placeholder="Your business name"/></div>
          <div className="input-wrap"><label className="input-label">Category</label><select className="input" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATEGORIES.map(c=><option key={c.label}>{c.label}</option>)}</select></div>
          <div className="input-wrap"><label className="input-label">Location</label><input className="input" value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="e.g. Brixton, London"/></div>
          <div className="input-wrap"><label className="input-label">About</label><textarea className="input" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Tell clients about your experience…"/></div>
          <div className="input-wrap"><label className="input-label">WhatsApp</label><input className="input" value={form.contactWhatsapp} onChange={e=>setForm({...form,contactWhatsapp:e.target.value})} placeholder="+44 7700 900000"/></div>
          <div className="input-wrap"><label className="input-label">Phone</label><input className="input" value={form.contactPhone} onChange={e=>setForm({...form,contactPhone:e.target.value})} placeholder="+44 7700 900000"/></div>
          <button className="btn btn-orange" style={{alignSelf:"flex-start"}} onClick={saveInfo} disabled={saving}>{saving?<><span className="spinner"/> Saving…</>:"Save Changes"}</button>
        </div>
      )}

      {tab==="services"&&(
        <div style={{maxWidth:580}}>
          <div className="card" style={{marginBottom:24}}>
            {services.length===0?<p style={{color:"var(--mist)",textAlign:"center",padding:"16px 0"}}>No services yet. Add your first below.</p>:
              services.map(s=>(
                <div key={s.id} className="service-row">
                  <span style={{fontWeight:500}}>{s.name}</span>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontWeight:700,color:"var(--orange)"}}>£{s.price}</span>
                    <button className="btn btn-ghost btn-sm" style={{padding:"4px 8px"}} onClick={()=>setServices(prev=>prev.filter(x=>x.id!==s.id))}>🗑️</button>
                  </div>
                </div>
              ))
            }
          </div>
          <div className="card">
            <h3 style={{fontFamily:"'Fraunces',serif",fontSize:18,marginBottom:16}}>Add a service</h3>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div className="input-wrap" style={{flex:2,minWidth:160}}>
                <label className="input-label">Service name</label>
                <input className="input" value={newSvc.name} onChange={e=>setNewSvc({...newSvc,name:e.target.value})} placeholder="e.g. Classic Haircut"/>
              </div>
              <div className="input-wrap" style={{flex:1,minWidth:100}}>
                <label className="input-label">Price (£)</label>
                <input className="input" type="number" min="0" value={newSvc.price} onChange={e=>setNewSvc({...newSvc,price:e.target.value})} placeholder="30"/>
              </div>
            </div>
            <button className="btn btn-orange" style={{marginTop:16}} onClick={addService}>Add Service</button>
          </div>
        </div>
      )}

      {tab==="portfolio"&&(
        <div>
          <p style={{color:"var(--mist)",marginBottom:24}}>Add work samples to your portfolio.</p>
          <div className="gallery-grid" style={{marginBottom:24}}>
            {portfolio.map((item,i)=>(
              <div key={i} className="gallery-img">
                {typeof item==="string"&&item.length<=2?item:<img src={item} alt="work" style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
                <button className="del-btn" onClick={()=>setPortfolio(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
              </div>
            ))}
            <div className="gallery-img" style={{border:"2px dashed var(--border)",background:"transparent",flexDirection:"column",gap:8,color:"var(--mist)",fontSize:13,cursor:"pointer"}} onClick={()=>{const emojis=["✂️","💅","🔧","⚡","🧹","📚","💄","👑","✨","🌟"];setPortfolio(prev=>[...prev,emojis[Math.floor(Math.random()*emojis.length)]]);}}>
              <span style={{fontSize:24}}>+</span><span>Add image</span>
            </div>
          </div>
          <button className="btn btn-orange" onClick={saveInfo} disabled={saving}>{saving?<><span className="spinner"/> Saving…</>:"Save Portfolio"}</button>
        </div>
      )}
    </div>
  );
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({mode,setMode,onLogin,onRegister,navigate}) {
  const [form,setForm] = useState({email:"",password:"",name:"",role:"client",businessName:""});
  const [errors,setErrors] = useState({});
  const [submitting,setSubmitting] = useState(false);
  const [serverError,setServerError] = useState("");

  const validate = () => {
    const e={};
    if(!/\S+@\S+\.\S+/.test(form.email)) e.email="Valid email required.";
    if(!form.password||form.password.length<6) e.password="At least 6 characters.";
    if(mode==="register"){if(!form.name.trim())e.name="Full name required.";if(form.role==="provider"&&!form.businessName.trim())e.businessName="Business name required.";}
    return e;
  };

  const handleSubmit = async () => {
    setServerError(""); const e=validate(); if(Object.keys(e).length){setErrors(e);return;} setErrors({}); setSubmitting(true);
    if(mode==="register"){
      const result = await submitToFormspree({_subject:`🎉 New ${form.role==="provider"?"Tasker":"Client"} — ${form.name}`,form_type:"registration",name:form.name,email:form.email,role:form.role,business_name:form.role==="provider"?form.businessName:"N/A"});
      setSubmitting(false); if(!result.ok){setServerError(result.error||"Registration failed.");return;} onRegister({...form});
    } else {
      await submitToFormspree({_subject:`🔑 Login — ${form.email}`,form_type:"login",email:form.email});
      setSubmitting(false);
      onLogin({id:"mock_"+Date.now(),email:form.email,name:form.email.split("@")[0],role:form.email.toLowerCase().includes("provider")?"provider":"client"});
    }
  };

  const field = (key,type="text") => ({className:`input${errors[key]?" err":""}`,type,value:form[key],onChange:e=>{setForm({...form,[key]:e.target.value});setErrors({...errors,[key]:""});}});

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="nav-logo" style={{justifyContent:"center",marginBottom:12}}>
            <div className="nav-logo-icon">⚡</div>
            <div className="nav-logo-text">Street<span>Tasker</span></div>
          </div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:26,marginBottom:6}}>{mode==="login"?"Welcome back":"Join for free"}</h2>
          <p style={{color:"var(--mist)",fontSize:14}}>{mode==="login"?"Sign in to your account":"Create your account today"}</p>
        </div>
        <div className="auth-box">
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {mode==="register"&&(
              <>
                <div className="input-wrap"><label className="input-label">Full Name</label><input {...field("name")} placeholder="Your name"/>{errors.name&&<span className="field-err">{errors.name}</span>}</div>
                <div className="input-wrap">
                  <label className="input-label">I am a…</label>
                  <select className="input" value={form.role} onChange={e=>{setForm({...form,role:e.target.value});setErrors({...errors,businessName:""});}}>
                    <option value="client">Client — looking for services</option>
                    <option value="provider">Tasker — offering services</option>
                  </select>
                </div>
                {form.role==="provider"&&<div className="input-wrap"><label className="input-label">Business Name</label><input {...field("businessName")} placeholder="Your business name"/>{errors.businessName&&<span className="field-err">{errors.businessName}</span>}</div>}
              </>
            )}
            <div className="input-wrap"><label className="input-label">Email</label><input {...field("email","email")} placeholder="you@example.com"/>{errors.email&&<span className="field-err">{errors.email}</span>}</div>
            <div className="input-wrap"><label className="input-label">Password</label><input {...field("password","password")} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>{errors.password&&<span className="field-err">{errors.password}</span>}</div>
            {serverError&&<div className="error-banner">{serverError}</div>}
            <button className="btn btn-orange btn-full btn-lg" onClick={handleSubmit} disabled={submitting}>{submitting?<><span className="spinner"/> {mode==="login"?"Signing in…":"Creating account…"}</>:mode==="login"?"Sign In":"Create Account"}</button>
            <p style={{textAlign:"center",fontSize:13,color:"var(--mist)"}}>
              {mode==="login"?"Don't have an account? ":"Already have an account? "}
              <span style={{color:"var(--orange)",cursor:"pointer",fontWeight:600}} onClick={()=>{setMode(mode==="login"?"register":"login");setErrors({});setServerError("");}}>
                {mode==="login"?"Sign up":"Sign in"}
              </span>
            </p>
            {mode==="login"&&<p style={{textAlign:"center",fontSize:12,color:"var(--mist)",borderTop:"1px solid var(--border)",paddingTop:14}}>💡 Use an email with <strong>"provider"</strong> to demo the Tasker Dashboard</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
function hideSplash() {
  const el = document.getElementById("loading");
  if(el){ el.style.transition="opacity 0.4s"; el.style.opacity="0"; setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },450); }
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
  // Hide after first paint
  requestAnimationFrame(()=>requestAnimationFrame(hideSplash));
} catch(err) {
  document.getElementById("loading").innerHTML = `<div style="color:white;text-align:center;padding:32px;max-width:480px"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-family:serif;margin-bottom:12px">Something went wrong</h2><pre style="background:rgba(255,255,255,.1);padding:16px;border-radius:8px;font-size:12px;text-align:left;overflow:auto">${err.message}</pre><a href="." style="display:inline-block;margin-top:20px;background:#FF6B35;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">Reload</a></div>`;
}
</script>

<!-- Fallback: if Babel fails to load, show error instead of infinite spinner -->
<script>
window.addEventListener('error', function(e) {
  var loading = document.getElementById('loading');
  if(loading && document.getElementById('root') && !document.getElementById('root').hasChildNodes()) {
    loading.innerHTML = '<div style="color:white;text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-family:serif;margin-bottom:12px">Failed to load</h2><p style="color:rgba(255,255,255,.6);margin-bottom:20px">A script could not be loaded. Check your connection and try again.</p><a href="." style="background:#FF6B35;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">Reload page</a></div>';
  }
});
// Nuclear fallback: if nothing has rendered after 10s, show error
setTimeout(function() {
  var root = document.getElementById('root');
  var loading = document.getElementById('loading');
  if(loading && root && !root.hasChildNodes()) {
    loading.innerHTML = '<div style="color:white;text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-family:serif;margin-bottom:12px">Taking too long</h2><p style="color:rgba(255,255,255,.6);margin-bottom:20px">Scripts are taking too long to load. Please check your connection.</p><a href="." style="background:#FF6B35;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">Reload page</a></div>';
  }
}, 10000);
</script>
