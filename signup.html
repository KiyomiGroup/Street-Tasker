<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — StreetTasker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0f0f;
    --surface: #fafaf8;
    --accent: #ff5c2b;
    --accent-dark: #d94a1e;
    --muted: #6b6b6b;
    --border: #e2e2de;
    --card: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: white;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--ink);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  nav a.nav-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.95rem;
  }

  nav a.nav-link:hover { color: var(--ink); }

  .page-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.06);
  }

  .form-card h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .form-card p.subtitle {
    color: var(--muted);
    margin-bottom: 32px;
    font-size: 0.95rem;
  }

  .role-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }

  .role-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .role-btn.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink);
  }

  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="tel"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:active { transform: scale(0.98); }

  .login-link {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }

  .error-msg {
    background: #fff0ed;
    border: 1px solid #ffcfc4;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.88rem;
    color: #c0392b;
    margin-bottom: 20px;
    display: none;
  }

  .success-msg {
    background: #edfff4;
    border: 1px solid #a3e4b8;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.88rem;
    color: #1a7a40;
    margin-bottom: 20px;
    display: none;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Street<span>Tasker</span></a>
  <a href="login.html" class="nav-link">Already have an account? Sign in →</a>
</nav>

<div class="page-wrap">
  <div class="form-card">
    <h1>Create account</h1>
    <p class="subtitle">Join thousands of locals getting things done.</p>

    <div class="role-toggle">
      <button class="role-btn active" onclick="setRole('customer', this)">I need tasks done</button>
      <button class="role-btn" onclick="setRole('tasker', this)">I want to earn</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="name-row">
      <div class="field">
        <label>First name</label>
        <input type="text" id="firstName" placeholder="Ada" />
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" id="lastName" placeholder="Okafor" />
      </div>
    </div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="ada@example.com" />
    </div>

    <div class="field">
      <label>Phone number</label>
      <input type="tel" id="phone" placeholder="+234 800 000 0000" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" />
    </div>

    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" />
    </div>

    <button class="btn-primary" onclick="handleSignup()">Create my account →</button>

    <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script>
  let selectedRole = 'customer';

  function setRole(role, btn) {
    selectedRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function handleSignup() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const phone     = document.getElementById('phone').value.trim();
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirmPassword').value;

    if (!firstName || !lastName) return showError('Please enter your full name.');
    if (!email || !email.includes('@')) return showError('Please enter a valid email address.');
    if (!phone) return showError('Please enter your phone number.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    if (password !== confirm) return showError('Passwords do not match.');

    // Check if email already exists
    const users = JSON.parse(localStorage.getItem('st_users') || '[]');
    if (users.find(u => u.email === email)) {
      return showError('An account with this email already exists. Please sign in.');
    }

    // Save new user
    const newUser = { firstName, lastName, email, phone, password, role: selectedRole, createdAt: Date.now() };
    users.push(newUser);
    localStorage.setItem('st_users', JSON.stringify(users));

    // Auto-login
    localStorage.setItem('st_currentUser', JSON.stringify(newUser));

    showSuccess('Account created! Redirecting to your dashboard…');

    setTimeout(() => {
      if (selectedRole === 'customer') {
        window.location.href = 'customer-dashboard.html';
      } else {
        window.location.href = 'tasker-dashboard.html';
      }
    }, 1200);
  }
</script>
</body>
</html>
