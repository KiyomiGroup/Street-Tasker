const STYLES = `
  :root{--ink:#0A0F1E;--ink-soft:#1E2640;--slate:#4A5568;--mist:#8896A8;--bone:#F5F3EF;--white:#FFFFFF;--orange:#FF6B35;--orange-deep:#E8531E;--orange-glow:rgba(255,107,53,0.15);--teal:#0FA89A;--teal-soft:rgba(15,168,154,0.12);--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);--glass:rgba(255,255,255,0.72);--shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);--shadow-lg:0 16px 48px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.06);--shadow-xl:0 32px 80px rgba(0,0,0,0.18);--radius-sm:8px;--radius:14px;--radius-lg:22px;--radius-xl:32px;--nav-h:68px;--page-max:1200px;}

  .nav-logo-text span{color:var(--orange);}
  .nav-links{display:flex;align-items:center;gap:4px;}
  .nav-link{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--slate);background:none;border:none;transition:all .18s;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;border:none;transition:all .2s;white-space:nowrap;}

  .btn-ink:hover:not(:disabled){background:var(--ink-soft);transform:translateY(-1px);}

  .hero-divider{width:1px;background:var(--border);align-self:stretch;margin:10px 0;}
  .hero-stats{display:flex;justify-content:center;gap:clamp(24px,4vw,48px);margin-top:52px;flex-wrap:wrap;}
  .hero-stat{color:rgba(255,255,255,.7);font-size:13px;font-weight:500;}

  /* Bento */
  .bento-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .bento-cell{border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform .22s,box-shadow .22s;position:relative;}
  .bento-cell:hover{transform:translateY(-4px) scale(1.01);box-shadow:var(--shadow-lg);}
  .bento-large{grid-column:span 2;grid-row:span 2;}
  .bento-wide{grid-column:span 2;}
  .bento-cell-inner{height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;min-height:160px;position:relative;}
  .bento-large .bento-cell-inner{min-height:320px;}
  .bento-svg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .bento-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.1) 60%);}

  @keyframes spin{to{transform:rotate(360deg)}}
  .error-banner{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;border-radius:8px;padding:12px 16px;font-size:13px;}
  .success-banner{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;border-radius:8px;padding:12px 16px;font-size:13px;}
  .toast{position:fixed;bottom:28px;right:28px;padding:14px 22px;border-radius:var(--radius);font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideUp .3s ease;z-index:9999;max-width:340px;display:flex;align-items:center;gap:10px;}
  .toast.success{background:var(--ink);color:white;}
  .toast.error{background:#EF4444;color:white;}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

  /* Subscription plans */
  .plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .plan-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius-lg);padding:28px;position:relative;transition:all .2s;}
  .plan-card.active{border-color:var(--orange);}
  .plan-card.elite-plan{background:var(--ink);color:white;}
  .plan-card.elite-plan .plan-feature{color:rgba(255,255,255,.75);}
  .plan-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:4px 14px;border-radius:99px;font-size:11px;font-weight:700;background:var(--orange);color:white;}
  .plan-name{font-family:'Fraunces',serif;font-size:22px;margin-bottom:6px;}
  .plan-price{font-size:32px;font-weight:800;margin-bottom:4px;}
  .plan-period{font-size:13px;color:var(--mist);}
  .plan-feature{font-size:13px;color:var(--slate);display:flex;align-items:flex-start;gap:8px;padding:6px 0;}
  .plan-feature::before{content:'✓';color:var(--teal);font-weight:700;flex-shrink:0;}

  /* Onboarding stepper */
  .stepper{display:flex;align-items:center;gap:0;margin-bottom:40px;overflow-x:auto;padding-bottom:4px;}
  .step-item{display:flex;align-items:center;flex-shrink:0;}
  .step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;border:2px solid var(--border);background:var(--white);color:var(--mist);transition:all .3s;flex-shrink:0;}
  .step-circle.done{background:var(--teal);border-color:var(--teal);color:white;}
  .step-circle.active{background:var(--orange);border-color:var(--orange);color:white;}
  .step-label{font-size:11px;font-weight:600;color:var(--mist);margin-top:6px;text-align:center;white-space:nowrap;}
  .step-label.active{color:var(--orange);}
  .step-label.done{color:var(--teal);}
  .step-line{height:2px;flex:1;background:var(--border);min-width:20px;transition:background .3s;}
  .step-line.done{background:var(--teal);}

  /* Upload zone */
  .upload-zone{border:2px dashed var(--border-strong);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--white);}
  .upload-zone:hover{border-color:var(--orange);background:var(--orange-glow);}
  .upload-zone input{display:none;}
  .upload-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:16px;}
  .upload-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);border:2px solid var(--border);}
  .upload-thumb-wrap{position:relative;}
  .upload-del{position:absolute;top:4px;right:4px;background:rgba(239,68,68,.9);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* Dashboard tabs */
  .dash-tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:32px;overflow-x:auto;}
  .dash-tab{padding:11px 18px;font-weight:600;cursor:pointer;color:var(--mist);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .18s;font-size:13px;border:none;background:none;}
  .dash-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
  .dash-tab:hover{color:var(--ink);}

  /* Instagram feed */
  .feed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
  .feed-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
  .feed-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;}
  .feed-avatar{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--border);}
  .feed-avatar svg{width:100%;height:100%;}
  .feed-img{width:100%;aspect-ratio:1;background:var(--bone);display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden;}
  .feed-img img{width:100%;height:100%;object-fit:cover;}
  .feed-actions{display:flex;align-items:center;gap:16px;padding:12px 16px 8px;}
  .feed-action-btn{background:none;border:none;font-size:22px;cursor:pointer;transition:transform .15s;padding:0;}
  .feed-action-btn:hover{transform:scale(1.15);}
  .feed-likes{font-size:13px;font-weight:700;padding:0 16px;margin-bottom:6px;}
  .feed-caption{font-size:13px;padding:0 16px 8px;line-height:1.5;}
  .feed-comments{padding:0 16px 12px;display:flex;flex-direction:column;gap:4px;}
  .feed-comment{font-size:12px;color:var(--slate);}
  .feed-comment strong{color:var(--ink);}
  .feed-add-comment{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);}
  .feed-add-comment input{border:none;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;flex:1;background:transparent;color:var(--ink);}
  .feed-add-comment input::placeholder{color:var(--mist);}
  .feed-post-btn{background:none;border:none;font-size:13px;font-weight:700;color:var(--orange);cursor:pointer;}

  /* Profile page */
  .profile-hero{background:linear-gradient(135deg,var(--ink) 0%,var(--ink-soft) 100%);padding:clamp(36px,5vw,64px) clamp(20px,4vw,48px);}
  .profile-hero-inner{max-width:var(--page-max);margin:0 auto;display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;}
  .profile-avatar{width:120px;height:120px;border-radius:var(--radius-lg);overflow:hidden;border:4px solid rgba(255,255,255,.2);flex-shrink:0;}
  .profile-avatar svg,.profile-avatar img{width:100%;height:100%;object-fit:cover;}
  .service-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
  .service-row:last-child{border-bottom:none;}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .gallery-img{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--bone);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:transform .2s;position:relative;}
  .gallery-img:hover{transform:scale(1.04);}
  .gallery-img img{width:100%;height:100%;object-fit:cover;}
  .gallery-img .del-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  .gallery-img:hover .del-btn{display:flex;}

  /* Filter bar */
  .filter-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;box-shadow:var(--shadow-sm);margin-bottom:32px;}

  /* How it works */
  .hiw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .hiw-card{background:var(--white);border-radius:var(--radius-lg);padding:32px;border:1px solid var(--border);position:relative;}
  .hiw-num{font-family:'Fraunces',serif;font-size:72px;font-weight:700;color:var(--bone);position:absolute;top:-8px;right:20px;line-height:1;pointer-events:none;}
  .hiw-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;}
  .hiw-title{font-family:'Fraunces',serif;font-size:20px;margin-bottom:10px;}
  .hiw-desc{color:var(--slate);font-size:14px;line-height:1.7;}

  /* Map */
  .map-section{background:var(--ink);border-radius:var(--radius-xl);overflow:hidden;position:relative;min-height:420px;display:flex;}
  .map-grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px;}
  .map-inner{position:relative;z-index:2;display:flex;width:100%;}
  .map-sidebar{width:300px;flex-shrink:0;padding:36px 28px;display:flex;flex-direction:column;justify-content:center;}
  .map-sidebar h2{font-family:'Fraunces',serif;font-size:28px;color:white;margin-bottom:10px;}
  .map-sidebar p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.6;margin-bottom:24px;}
  .map-pins{flex:1;position:relative;min-height:340px;}
  .map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;}
  .map-pin-dot{width:38px;height:38px;border-radius:50%;background:var(--orange);border:3px solid white;box-shadow:0 4px 16px rgba(255,107,53,.4);display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .2s;}
  .map-pin:hover .map-pin-dot{transform:scale(1.2);}
  .map-pin-tail{width:2px;height:10px;background:var(--orange);margin:0 auto;}
  .map-pin-card{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--white);border-radius:var(--radius);padding:12px;width:170px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s;font-size:12px;}
  .map-pin:hover .map-pin-card{opacity:1;}
  .map-pin-card-name{font-weight:700;font-size:13px;margin-bottom:2px;}
  .map-pin-card-cat{color:var(--teal);font-weight:600;margin-bottom:2px;}

  /* Reviews */
  .review-card{background:var(--white);border-radius:var(--radius-lg);padding:28px;border:1px solid var(--border);}
  .review-quote{font-size:36px;color:var(--orange);line-height:1;margin-bottom:12px;font-family:'Fraunces',serif;}
  .review-text{font-size:15px;line-height:1.7;color:var(--slate);margin-bottom:20px;}
  .review-author{display:flex;align-items:center;gap:12px;}
  .review-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

  /* CTA banner */
  .cta-banner{background:linear-gradient(135deg,var(--orange) 0%,#FF9A56 60%,#FFB347 100%);border-radius:var(--radius-xl);padding:clamp(48px,6vw,80px) clamp(32px,6vw,80px);display:flex;align-items:center;justify-content:space-between;gap:32px;overflow:hidden;position:relative;}
  .cta-banner::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.12);}
  .cta-banner-text{position:relative;z-index:2;}
  .cta-banner-text h2{font-family:'Fraunces',serif;font-size:clamp(28px,4vw,42px);color:white;margin-bottom:10px;}
  .cta-banner-text p{color:rgba(255,255,255,.85);font-size:16px;max-width:420px;}
  .cta-banner-actions{position:relative;z-index:2;display:flex;gap:12px;flex-shrink:0;flex-wrap:wrap;}

  /* Subscription paywall */
  .paywall-overlay{position:fixed;inset:0;background:rgba(10,15,30,0.85);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
  .paywall-card{background:var(--white);border-radius:var(--radius-xl);padding:clamp(28px,4vw,48px);max-width:860px;width:100%;max-height:90vh;overflow-y:auto;}
  .paywall-card h2{font-family:'Fraunces',serif;font-size:clamp(24px,3vw,36px);margin-bottom:8px;}
  .paywall-sub{color:var(--slate);font-size:15px;margin-bottom:32px;}
  .booking-counter{background:linear-gradient(135deg,var(--orange-glow),var(--teal-soft));border:1px solid var(--border-strong);border-radius:var(--radius);padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:14px;}
  .booking-bar{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
  .booking-bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--teal));border-radius:99px;transition:width .6s;}

  /* Footer */
  .footer{background:var(--ink);color:rgba(255,255,255,.7);padding:64px clamp(20px,4vw,80px) 32px;}
  .footer-top{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:48px;margin-bottom:48px;}
  .footer-col h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.35);margin-bottom:14px;}
  .footer-links{display:flex;flex-direction:column;gap:10px;}
  .footer-links a{font-size:14px;color:rgba(255,255,255,.55);transition:color .15s;}
  .footer-links a:hover{color:white;}
  .footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:13px;flex-wrap:wrap;gap:12px;}
  .social-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .18s;}
  .social-btn:hover{background:var(--orange);color:white;}

  /* Auth */
  .auth-wrap{min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;padding:40px 24px;}
  .auth-card{max-width:440px;width:100%;}
  .auth-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px;box-shadow:var(--shadow);}

  /* Onboarding */
  .onboard-wrap{max-width:680px;margin:0 auto;padding:clamp(32px,5vw,60px) clamp(20px,4vw,40px);}
  .onboard-step{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* Post composer */
  .composer{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;}
  .composer textarea{width:100%;border:none;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;resize:none;min-height:60px;color:var(--ink);}
  .composer textarea::placeholder{color:var(--mist);}

  @media(max-width:900px){
    .bento-grid{grid-template-columns:repeat(2,1fr);}
    .bento-large{grid-column:span 2;}
    .hiw-grid{grid-template-columns:1fr;}
    .footer-top{grid-template-columns:1fr 1fr;}
    .map-inner{flex-direction:column;}
    .map-sidebar{width:100%;}
    .map-pins{min-height:260px;}
    .cta-banner{flex-direction:column;text-align:center;}
    .cta-banner-actions{justify-content:center;}
    .plans-grid{grid-template-columns:1fr;}
    .profile-hero-inner{flex-direction:column;}
  }
  @media(max-width:600px){
    .bento-grid{grid-template-columns:1fr;}
    .bento-large,.bento-wide{grid-column:span 1;}
    .footer-top{grid-template-columns:1fr;}
    .hero-search-wrap{flex-direction:column;}
    .hero-divider{display:none;}
    .nav-links{display:none;}
  }
`;

// ─── AUTH CONTEXT ─────────────────────────────────────────────────────────────
const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage] = useState("home");
  const [user,setUser] = useState(null);
  const [taskers,setTaskers] = useState(INIT_TASKERS);
  const [selectedTasker,setSelectedTasker] = useState(null);
  const [searchQuery,setSearchQuery] = useState({service:"",location:""});
  const [authMode,setAuthMode] = useState("login");
  const [toast,setToast] = useState(null);
  const [globalPosts,setGlobalPosts] = useState(INIT_POSTS);
  const [showPaywall,setShowPaywall] = useState(false);
  const [paywallTasker,setPaywallTasker] = useState(null);

  const showToast = useCallback((msg,type="success")=>{
    setToast({msg,type}); setTimeout(()=>setToast(null),4000);
  },[]);

  const navigate = (pg,data={}) => {
    if(pg==="profile"&&data.tasker) setSelectedTasker(data.tasker);
    setPage(pg); window.scrollTo(0,0);
  };

  const handleSearch = (q) => { setSearchQuery(q); navigate("search"); };

  const handleLogin = (u) => {
    setUser(u);
    navigate(u.role==="provider"?"dashboard":u.role==="client"?"clientdash":"home");
    showToast(`Welcome back, ${u.name}! 👋`);
  };

  const handleRegister = (u) => {
    const newUser = {...u, id:"user_"+Date.now()};
    setUser(newUser);
    if(u.role==="provider") {
      navigate("onboard");
    } else {
      navigate("clientdash");
    }
    showToast("Welcome to Street Tasker! 🎉");
  };

  const handleOnboardComplete = (profile) => {
    const newTasker = {
      id:"t_"+Date.now(), userId:user.id,
      name:user.name, business:profile.businessName||user.name,
      category:profile.category||"Barber", location:profile.location||"Lagos",
      rating:5.0, reviews:0, price:profile.startingPrice||0,
      plan:"free", bookingsUsed:0,
      desc:profile.description||"",
      services:profile.services||[], portfolio:profile.workPhotos||[],
      posts:[], coverImg:profile.coverImg||null,
      contactWhatsapp:profile.whatsapp||"", contactPhone:profile.phone||"",
    };
    setTaskers(prev=>[...prev, newTasker]);
    navigate("dashboard");
    showToast("Profile created! Welcome aboard 🎉");
  };

  const handleUpdateTasker = (updated) => {
    setTaskers(prev=>prev.map(t=>t.userId===user?.id?{...t,...updated}:t));
  };

  const handleBooking = (tasker) => {
    const myTasker = taskers.find(t=>t.userId===tasker.userId);
    const t = myTasker||tasker;
    const limit = t.plan==="elite"?999999:t.plan==="pro"?100:5;
    if(t.bookingsUsed>=limit) {
      setPaywallTasker(t);
      setShowPaywall(true);
      return false;
    }
    setTaskers(prev=>prev.map(tk=>tk.id===t.id?{...tk,bookingsUsed:(tk.bookingsUsed||0)+1}:tk));
    return true;
  };

  const handleSubscribe = (plan) => {
    if(!paywallTasker) return;
    setTaskers(prev=>prev.map(t=>t.id===paywallTasker.id?{...t,plan:plan.id,bookingsUsed:0}:t));
    setShowPaywall(false);
    showToast(`Upgraded to ${plan.name} plan! 🎉`);
  };

  const handleAddPost = (taskerId, post) => {
    const fullPost = {...post, taskerId, id:"post_"+Date.now(), likes:0, comments:[], liked:false};
    setTaskers(prev=>prev.map(t=>t.id===taskerId?{...t,posts:[fullPost,...(t.posts||[])]}:t));
    setGlobalPosts(prev=>[{...fullPost, taskerName:taskers.find(t=>t.id===taskerId)?.business||"", taskerCategory:taskers.find(t=>t.id===taskerId)?.category||""},...prev]);
    showToast("Post shared! ✓");
  };

  const handleLike = (postId) => {
    setGlobalPosts(prev=>prev.map(p=>p.id===postId?{...p,likes:p.liked?p.likes-1:p.likes+1,liked:!p.liked}:p));
  };

  const handleComment = (postId, text) => {
    setGlobalPosts(prev=>prev.map(p=>p.id===postId?{...p,comments:[...p.comments,{user:user?.name||"You",text}]}:p));
  };

  const myTasker = taskers.find(t=>t.userId===user?.id);

  return (
    <>
      <style>{STYLES}</style>
      <AuthCtx.Provider value={{user,setUser,myTasker}}>
        <Navbar navigate={navigate}/>
        {page==="home"       && <HomePage navigate={navigate} onSearch={handleSearch} taskers={taskers} showToast={showToast}/>}
        {page==="search"     && <SearchPage navigate={navigate} taskers={taskers} initial={searchQuery}/>}
        {page==="profile"    && <ProfilePage tasker={selectedTasker} navigate={navigate} showToast={showToast} onBook={handleBooking}/>}
        {page==="dashboard"  && <Dashboard navigate={navigate} tasker={myTasker} onUpdate={handleUpdateTasker} onAddPost={handleAddPost} showToast={showToast}/>}
        {page==="clientdash" && <ClientDashboard navigate={navigate} posts={globalPosts} taskers={taskers} onLike={handleLike} onComment={handleComment} showToast={showToast}/>}
        {page==="auth"       && <AuthPage mode={authMode} setMode={setAuthMode} onLogin={handleLogin} onRegister={handleRegister} navigate={navigate}/>}
        {page==="onboard"    && <OnboardingPage onComplete={handleOnboardComplete} navigate={navigate} showToast={showToast}/>}
        {page==="become"     && <BecomeTaskerPage navigate={navigate}/>}
        {page==="pricing"    && <PricingPage navigate={navigate} myTasker={myTasker} onSubscribe={handleSubscribe}/>}
      </AuthCtx.Provider>
      {showPaywall && <PaywallModal tasker={paywallTasker} onClose={()=>setShowPaywall(false)} onSubscribe={handleSubscribe}/>}
      {toast && <div className={`toast ${toast.type}`}><span>{toast.type==="success"?"✓":"✕"}</span>{toast.msg}</div>}
    </>
  );
}

// ─── NAVBAR ──────────────────────────────────────────────────────────────────
function Navbar({navigate}) {
  const {user,setUser,myTasker} = useAuth();
  return (
    <nav className="navbar">
      <div className="nav-logo" onClick={()=>navigate("home")}>
        <div className="nav-logo-icon">⚡</div>
        <div className="nav-logo-text">Street<span>Tasker</span></div>
      </div>
      <div className="nav-links">
        <button className="nav-link" onClick={()=>navigate("search")}>Browse</button>
        <button className="nav-link" onClick={()=>navigate("become")}>Become a Tasker</button>
        <button className="nav-link" onClick={()=>navigate("pricing")}>Pricing</button>
      </div>
      <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
        {user ? (
          <div className="nav-pill">
            <span className="pill-text">{user.name}</span>

// ─── SEARCH PAGE ─────────────────────────────────────────────────────────────
function SearchPage({navigate,taskers,initial}) {
  const [service,setService] = useState(initial.service||"");
  const [location,setLocation] = useState(initial.location||"");
  const [activeFilter,setActiveFilter] = useState(initial.service||"");
  const [sortBy,setSortBy] = useState("rating");

  const filtered = taskers.filter(t=>{
    const ms = !activeFilter||t.category.toLowerCase().includes(activeFilter.toLowerCase())||t.business?.toLowerCase().includes(activeFilter.toLowerCase())||t.name.toLowerCase().includes(activeFilter.toLowerCase());
    const ml = !location||t.location.toLowerCase().includes(location.toLowerCase());
    return ms&&ml;
  }).sort((a,b)=>{
    if(a.plan==="elite"&&b.plan!=="elite") return -1;
    if(b.plan==="elite"&&a.plan!=="elite") return 1;
    return sortBy==="rating"?b.rating-a.rating:sortBy==="price"?a.price-b.price:b.reviews-a.reviews;
  });

  return (
    <div className="page-wrap" style={{paddingTop:40,paddingBottom:80}}>
      {filtered.some(t=>t.plan==="elite")&&(
        <div style={{background:"linear-gradient(135deg,rgba(255,107,53,.08),rgba(15,168,154,.08))",border:"1px solid rgba(255,107,53,.2)",borderRadius:"var(--radius)",padding:"12px 20px",marginBottom:20,fontSize:13,display:"flex",alignItems:"center",gap:10}}>
          <span>⚡</span><span><strong>Elite taskers</strong> are featured at the top of results for maximum visibility.</span>
        </div>
      )}
      <h1 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(28px,4vw,42px)",marginBottom:4}}>Find a tasker</h1>
      <p style={{color:"var(--mist)",marginBottom:24}}>{filtered.length} tasker{filtered.length!==1?"s":""} found</p>
      <div className="filter-bar">
        <div className="input-wrap" style={{flex:2}}>
          <label className="input-label">Service or name</label>
          <input className="input" placeholder="e.g. barber, plumber..." value={service} onChange={e=>setService(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setActiveFilter(service)}/>
        </div>
        <div className="input-wrap" style={{flex:1}}>
          <label className="input-label">Location</label>
          <input className="input" placeholder="Lagos, Abuja..." value={location} onChange={e=>setLocation(e.target.value)}/>
        </div>
        <div className="input-wrap" style={{minWidth:130}}>
          <label className="input-label">Sort by</label>
          <select className="input" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="rating">Top rated</option>
            <option value="price">Lowest price</option>
            <option value="reviews">Most reviews</option>
          </select>
        </div>
        <button className="btn btn-orange" onClick={()=>setActiveFilter(service)}>Search</button>
        <button className="btn btn-ghost" onClick={()=>{setService("");setLocation("");setActiveFilter("");}}>Clear</button>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:28}}>
        {CATEGORIES.map(cat=>(
          <button key={cat.label} className={`btn btn-sm ${activeFilter===cat.label?"btn-orange":"btn-ghost"}`} onClick={()=>{setService(cat.label);setActiveFilter(cat.label);}}>{cat.label}</button>
        ))}
      </div>
      {filtered.length===0
        ? <div className="empty"><div className="empty-icon">🔍</div><h3 style={{fontFamily:"'Fraunces',serif",marginBottom:8}}>No taskers found</h3><p>Try different filters.</p></div>
        : <div className="card-grid-4">{filtered.map(t=><TaskerCard key={t.id} tasker={t} onClick={()=>navigate("profile",{tasker:t})}/>)}</div>
      }
    </div>
  );
}

  const [sending,setSending] = useState(false);
  const [sent,setSent] = useState(false);
  const [cfErrors,setCfErrors] = useState({});
  const [booked,setBooked] = useState(false);

  if(!tasker) return <div className="page-wrap"><p style={{color:"var(--mist)",padding:"60px 0"}}>Tasker not found.</p></div>;

  const handleWhatsApp = () => {
    const msg = encodeURIComponent(`Hi ${tasker.business||tasker.name}! I found you on Street Tasker and would like to enquire about your services.`);
    window.open(`https://wa.me/${tasker.contactWhatsapp?.replace(/\D/g,"")}?text=${msg}`,"_blank");
  };

  const handleBook = () => {
    const ok = onBook(tasker);
    if(ok) { setBooked(true); showToast("Booking confirmed! ✓"); }

    const e={};
    if(!cf.name.trim()) e.name="Name required.";
    if(!/\S+@\S+\.\S+/.test(cf.email)) e.email="Valid email required.";
    if(!cf.message.trim()) e.message="Message required.";

                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:20,marginBottom:14}}>Recent posts</h3>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {(tasker.posts||[]).map((p,i)=>(
                    <div key={i} style={{aspectRatio:"1",borderRadius:8,overflow:"hidden",background:"var(--bone)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>
                      {p.img?<img src={p.img} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:"📸"}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          <div style={{position:"sticky",top:"calc(var(--nav-h) + 20px)"}}>
            <div className="card" style={{marginBottom:14}}>
              <div style={{textAlign:"center",paddingBottom:16,borderBottom:"1px solid var(--border)",marginBottom:16}}>
                <div style={{width:64,height:64,borderRadius:14,overflow:"hidden",margin:"0 auto 10px",border:"2px solid var(--border)"}}>
                  <div dangerouslySetInnerHTML={{__html:getBizImg(tasker.category)}} style={{width:"100%",height:"100%"}}/>
                </div>
                <div style={{fontFamily:"'Fraunces',serif",fontSize:17,marginBottom:3}}>{tasker.name}</div>
                <div style={{fontSize:12,color:"var(--mist)"}}>{tasker.category} · {tasker.location}</div>
              </div>
              {booked

              }

              {tasker.contactPhone&&<button className="btn btn-ghost btn-full" onClick={()=>window.location.href=`tel:${tasker.contactPhone}`}>📞 Call</button>}
            </div>
            <div className="card">
              <h4 style={{fontFamily:"'Fraunces',serif",fontSize:16,marginBottom:14}}>Send an enquiry</h4>
              {sent?<div className="success-banner">✓ Message sent!</div>:(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div className="input-wrap"><label className="input-label">Your name</label><input className={`input${cfErrors.name?" err":""}`} value={cf.name} onChange={e=>setCf({...cf,name:e.target.value})} placeholder="Full name"/>{cfErrors.name&&<span className="field-err">{cfErrors.name}</span>}</div>
                  <div className="input-wrap"><label className="input-label">Email</label><input className={`input${cfErrors.email?" err":""}`} value={cf.email} onChange={e=>setCf({...cf,email:e.target.value})} placeholder="you@email.com"/>{cfErrors.email&&<span className="field-err">{cfErrors.email}</span>}</div>
                  <div className="input-wrap"><label className="input-label">Message</label><textarea className={`input${cfErrors.message?" err":""}`} value={cf.message} onChange={e=>setCf({...cf,message:e.target.value})} placeholder="What do you need?"/>{cfErrors.message&&<span className="field-err">{cfErrors.message}</span>}</div>
                  {cfErrors._server&&<div className="error-banner">{cfErrors._server}</div>}
                  <button className="btn btn-orange btn-full" onClick={handleContact} disabled={sending}>{sending?<><span className="spinner"/> Sending…</>:"Send message"}</button>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ─── ONBOARDING PAGE (step-by-step) ─────────────────────────────────────────
function OnboardingPage({onComplete,navigate,showToast}) {
  const {user} = useAuth();
  const [step,setStep] = useState(0);
  const [form,setForm] = useState({businessName:"",category:"Barber",location:"",description:"",phone:"",whatsapp:"",startingPrice:"",coverImg:null,workPhotos:[],services:[{name:"",price:"",img:null}]});
  const [saving,setSaving] = useState(false);

  const STEPS = ["Business Info","Contact","Services","Photos","Complete"];

  const nextStep = () => { if(step<STEPS.length-1) setStep(s=>s+1); };
  const prevStep = () => { if(step>0) setStep(s=>s-1); };

  const handleCoverUpload = async e => {
    const file = e.target.files[0]; if(!file) return;
    const data = await readFile(file);
    setForm(f=>({...f,coverImg:data}));
  };

  const handleWorkPhotos = async e => {
    const files = Array.from(e.target.files);
    const datas = await Promise.all(files.map(readFile));
    setForm(f=>({...f,workPhotos:[...f.workPhotos,...datas].slice(0,12)}));
  };

  const handleServiceImg = async (i,e) => {
    const file = e.target.files[0]; if(!file) return;
    const data = await readFile(file);
    setForm(f=>{ const svcs=[...f.services]; svcs[i]={...svcs[i],img:data}; return {...f,services:svcs}; });
  };

  const handleSaveStep = async () => {
    setSaving(true);
    await new Promise(r=>setTimeout(r,600));
    setSaving(false);
    if(step===STEPS.length-2) { setStep(STEPS.length-1); }
    else nextStep();
  };

  const handleFinish = () => onComplete(form);

  return (
    <div className="onboard-wrap">
      <div style={{marginBottom:32}}>
        <h1 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(26px,4vw,38px)",marginBottom:8}}>Set up your tasker profile</h1>
        <p style={{color:"var(--mist)"}}>Complete all steps to go live and start getting bookings.</p>
      </div>

      {/* Stepper */}
      <div className="stepper">
        {STEPS.map((label,i)=>(
          <div key={i} className="step-item">
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div className={`step-circle ${i<step?"done":i===step?"active":""}`}>{i<step?"✓":i+1}</div>
              <div className={`step-label ${i<step?"done":i===step?"active":""}`}>{label}</div>
            </div>
            {i<STEPS.length-1&&<div className={`step-line ${i<step?"done":""}`}/>}
          </div>
        ))}
      </div>

      <div className="onboard-step card" style={{padding:"clamp(24px,4vw,40px)"}}>
        {/* Step 0: Business Info */}
        {step===0&&(
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontSize:22,marginBottom:4}}>Tell us about your business</h2>
            <div className="input-wrap"><label className="input-label">Business name *</label><input className="input" value={form.businessName} onChange={e=>setForm(f=>({...f,businessName:e.target.value}))} placeholder="e.g. Emeka's Fadez"/></div>
            <div className="input-wrap"><label className="input-label">Category *</label><select className="input" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATEGORIES.map(c=><option key={c.label}>{c.label}</option>)}</select></div>
            <div className="input-wrap"><label className="input-label">Location *</label><input className="input" value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="e.g. Surulere, Lagos"/></div>
            <div className="input-wrap"><label className="input-label">About your business</label><textarea className="input" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Tell clients what makes your service special..."/></div>
            <div className="input-wrap"><label className="input-label">Starting price (₦)</label><input className="input" type="number" value={form.startingPrice} onChange={e=>setForm(f=>({...f,startingPrice:e.target.value}))} placeholder="e.g. 2500"/></div>
          </div>
        )}

        {/* Step 1: Contact */}
        {step===1&&(
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontSize:22,marginBottom:4}}>How can clients reach you?</h2>
            <div className="input-wrap"><label className="input-label">WhatsApp number</label><input className="input" value={form.whatsapp} onChange={e=>setForm(f=>({...f,whatsapp:e.target.value}))} placeholder="+234 801 234 5678"/></div>
            <div className="input-wrap"><label className="input-label">Phone number</label><input className="input" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="+234 801 234 5678"/></div>
            <div style={{background:"var(--teal-soft)",border:"1px solid var(--teal)",borderRadius:"var(--radius-sm)",padding:"14px 16px",fontSize:13,color:"var(--teal)"}}>
              💬 Clients will contact you directly via WhatsApp. Make sure your number is active.
            </div>
          </div>
        )}

        {/* Step 2: Services */}
        {step===2&&(
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontSize:22,marginBottom:4}}>What services do you offer?</h2>
            {form.services.map((svc,i)=>(
              <div key={i} style={{border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:18,display:"flex",flexDirection:"column",gap:12}}>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <div className="input-wrap" style={{flex:2,minWidth:150}}>
                    <label className="input-label">Service name</label>
                    <input className="input" value={svc.name} onChange={e=>{ const s=[...form.services]; s[i]={...s[i],name:e.target.value}; setForm(f=>({...f,services:s})); }} placeholder="e.g. Classic Haircut"/>
                  </div>
                  <div className="input-wrap" style={{flex:1,minWidth:100}}>
                    <label className="input-label">Price (₦)</label>
                    <input className="input" type="number" value={svc.price} onChange={e=>{ const s=[...form.services]; s[i]={...s[i],price:e.target.value}; setForm(f=>({...f,services:s})); }} placeholder="2500"/>
                  </div>
                </div>
                <div>
                  <label className="input-label" style={{display:"block",marginBottom:8}}>Service photo (optional)</label>
                  {svc.img
                    ? <div style={{position:"relative",display:"inline-block"}}><img src={svc.img} style={{width:80,height:80,objectFit:"cover",borderRadius:8}} alt=""/><button className="upload-del" onClick={()=>{ const s=[...form.services]; s[i]={...s[i],img:null}; setForm(f=>({...f,services:s})); }}>✕</button></div>
                    : <label className="upload-zone" style={{padding:"16px 20px",display:"inline-flex",alignItems:"center",gap:10,cursor:"pointer"}}><span>📷 Add photo</span><input type="file" accept="image/*" onChange={e=>handleServiceImg(i,e)}/></label>
                  }
                </div>
                {form.services.length>1&&<button className="btn btn-sm btn-red" style={{alignSelf:"flex-start"}} onClick={()=>setForm(f=>({...f,services:f.services.filter((_,j)=>j!==i)}))}>Remove</button>}
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" style={{alignSelf:"flex-start"}} onClick={()=>setForm(f=>({...f,services:[...f.services,{name:"",price:"",img:null}]}))}>+ Add another service</button>
          </div>
        )}

        {/* Step 3: Photos */}
        {step===3&&(
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <h2 style={{fontFamily:"'Fraunces',serif",fontSize:22,marginBottom:4}}>Upload your photos</h2>
            <div>
              <p style={{fontWeight:600,marginBottom:10}}>Business cover photo <span style={{color:"var(--mist)",fontWeight:400,fontSize:13}}>(shows on your card)</span></p>
              {form.coverImg
                ? <div style={{position:"relative",display:"inline-block"}}>
                    <img src={form.coverImg} style={{width:200,height:130,objectFit:"cover",borderRadius:12}} alt="cover"/>
                    <button className="upload-del" onClick={()=>setForm(f=>({...f,coverImg:null}))}>✕</button>
                  </div>
                : <label className="upload-zone" style={{maxWidth:300,display:"block"}}>
                    <div style={{fontSize:36,marginBottom:8}}>📸</div>
                    <div style={{fontWeight:600,marginBottom:4}}>Upload cover photo</div>
                    <div style={{fontSize:12,color:"var(--mist)"}}>JPG, PNG — recommended 800×500px</div>
                    <input type="file" accept="image/*" onChange={handleCoverUpload}/>
                  </label>
              }
            </div>
            <div>
              <p style={{fontWeight:600,marginBottom:10}}>Work photos <span style={{color:"var(--mist)",fontWeight:400,fontSize:13}}>(portfolio — up to 12)</span></p>
              <label className="upload-zone">
                <div style={{fontSize:36,marginBottom:8}}>🖼️</div>
                <div style={{fontWeight:600,marginBottom:4}}>Upload your work</div>
                <div style={{fontSize:12,color:"var(--mist)"}}>Select multiple photos at once</div>
                <input type="file" accept="image/*" multiple onChange={handleWorkPhotos}/>
              </label>
              {form.workPhotos.length>0&&(
                <div className="upload-preview">
                  {form.workPhotos.map((img,i)=>(
                    <div key={i} className="upload-thumb-wrap">
                      <img src={img} className="upload-thumb" alt="work"/>
                      <button className="upload-del" onClick={()=>setForm(f=>({...f,workPhotos:f.workPhotos.filter((_,j)=>j!==i)}))}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* Step 4: Complete */}
        {step===4&&(
          <div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:72,marginBottom:20}}>🎉</div>
            <h2 style={{fontFamily:"'Fraunces',serif",fontSize:28,marginBottom:12}}>You're all set!</h2>
            <p style={{color:"var(--slate)",fontSize:16,marginBottom:8,lineHeight:1.6}}>Your profile is ready. You're on the <strong>Free plan</strong> with <strong>5 free bookings</strong>.</p>
            <p style={{color:"var(--mist)",fontSize:14,marginBottom:28}}>Upgrade anytime to unlock more bookings and features.</p>
            <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="btn btn-orange btn-lg" onClick={handleFinish}>Go to Dashboard →</button>
              <button className="btn btn-ghost btn-lg" onClick={()=>navigate("pricing")}>View plans</button>
            </div>
          </div>
        )}

        {/* Navigation buttons */}
        {step<STEPS.length-1&&(
          <div style={{display:"flex",justifyContent:"space-between",marginTop:28,paddingTop:20,borderTop:"1px solid var(--border)"}}>
            <button className="btn btn-ghost" onClick={prevStep} disabled={step===0}>← Previous</button>
            <button className="btn btn-orange" onClick={handleSaveStep} disabled={saving}>
              {saving?<><span className="spinner"/> Saving…</>:step===STEPS.length-2?"Finish & Preview →":"Save & Continue →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PROVIDER DASHBOARD ──────────────────────────────────────────────────────
function Dashboard({navigate,tasker,onUpdate,onAddPost,showToast}) {
  const {user} = useAuth();
  const [tab,setTab] = useState("overview");
  const [form,setForm] = useState({businessName:tasker?.business||"",category:tasker?.category||"Barber",location:tasker?.location||"",description:tasker?.desc||"",contactWhatsapp:tasker?.contactWhatsapp||"",contactPhone:tasker?.contactPhone||""});
  const [services,setServices] = useState(tasker?.services||[]);
  const [newSvc,setNewSvc] = useState({name:"",price:"",img:null});
  const [portfolio,setPortfolio] = useState(tasker?.portfolio||[]);
  const [saving,setSaving] = useState(false);
  const [postCaption,setPostCaption] = useState("");
  const [postImg,setPostImg] = useState(null);
  const [posting,setPosting] = useState(false);

  const plan = tasker?.plan||"free";
  const bookingsUsed = tasker?.bookingsUsed||0;
  const limit = plan==="elite"?9999:plan==="pro"?100:5;
  const currentPlan = PLANS.find(p=>p.id===plan)||PLANS[0];

  const saveInfo = async () => {
    setSaving(true);
    await postForm({_subject:"Profile Update",form_type:"dashboard_update",...form});
    onUpdate({business:form.businessName,category:form.category,location:form.location,desc:form.description,contactWhatsapp:form.contactWhatsapp,contactPhone:form.contactPhone,services,portfolio});
    setSaving(false);
    showToast("Profile updated! ✓");
  };

  const handlePostImg = async e => {
    const file = e.target.files[0]; if(!file) return;
    const data = await readFile(file);
    setPostImg(data);
  };

  const handlePost = async () => {
    if(!postCaption.trim()&&!postImg) return;
    setPosting(true);
    await new Promise(r=>setTimeout(r,500));
    onAddPost(tasker?.id,{img:postImg,caption:postCaption});
    setPostCaption(""); setPostImg(null); setPosting(false);
    showToast("Post shared! ✓");
  };

  const handlePortfolioUpload = async e => {
    const files = Array.from(e.target.files);
    const datas = await Promise.all(files.map(readFile));
    setPortfolio(prev=>[...prev,...datas].slice(0,24));
  };

  return (
    <div style={{maxWidth:960,margin:"0 auto",padding:"clamp(24px,4vw,48px) clamp(20px,4vw,40px) 80px"}}>
      {/* Header */}
      <div style={{background:"var(--ink)",borderRadius:"var(--radius-lg)",padding:"28px 32px",marginBottom:28,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".6px",textTransform:"uppercase",color:"rgba(255,255,255,.4)",marginBottom:6}}>Provider Dashboard</div>
          <h2 style={{fontFamily:"'Fraunces',serif",color:"white",fontSize:24}}>{form.businessName||user?.name}</h2>
          <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
            <span style={{background:currentPlan.color+"22",color:currentPlan.color,border:`1px solid ${currentPlan.color}44`,borderRadius:99,padding:"3px 12px",fontSize:12,fontWeight:700}}>{currentPlan.name} Plan</span>
            <span style={{fontSize:12,color:"rgba(255,255,255,.5)"}}>{plan==="elite"?"Unlimited":bookingsUsed+"/"+limit} bookings used</span>
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" style={{color:"rgba(255,255,255,.7)",borderColor:"rgba(255,255,255,.2)"}} onClick={()=>navigate("pricing")}>⚡ Upgrade Plan</button>
          <button className="btn btn-ghost" style={{color:"rgba(255,255,255,.5)",borderColor:"rgba(255,255,255,.12)"}} onClick={()=>navigate("home")}>← Home</button>
        </div>
      </div>

      {/* Booking bar */}
      {plan!=="elite"&&(
        <div className="booking-counter" style={{marginBottom:24}}>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>Bookings</div>
            <div style={{fontSize:12,color:"var(--mist)"}}>
              {bookingsUsed} of {limit} used
              {bookingsUsed>=limit&&<span style={{color:"var(--orange)",fontWeight:700,marginLeft:8}}>— Limit reached!</span>}
            </div>
          </div>
          <div style={{flex:1}}>
            <div className="booking-bar"><div className="booking-bar-fill" style={{width:`${Math.min(100,(bookingsUsed/limit)*100)}%`}}/></div>
          </div>
          {bookingsUsed>=limit&&<button className="btn btn-orange btn-sm" onClick={()=>navigate("pricing")}>Upgrade</button>}
        </div>
      )}

      {/* Tabs */}
      <div className="dash-tabs">
        {[["overview","📊 Overview"],["post","📸 New Post"],["info","🏪 Business Info"],["services","🔧 Services"],["portfolio","🖼️ Portfolio"]].map(([t,label])=>(
          <button key={t} className={`dash-tab${tab===t?" active":""}`} onClick={()=>setTab(t)}>{label}</button>
        ))}
      </div>

      {/* Overview */}
      {tab==="overview"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:16}}>
          {[{label:"Total Bookings",val:bookingsUsed,icon:"📅"},{label:"Services Listed",val:(tasker?.services||[]).length,icon:"🔧"},{label:"Portfolio Photos",val:(tasker?.portfolio||[]).length,icon:"🖼️"},{label:"Posts",val:(tasker?.posts||[]).length,icon:"📸"}].map((stat,i)=>(
            <div key={i} className="card" style={{textAlign:"center"}}>
              <div style={{fontSize:32,marginBottom:10}}>{stat.icon}</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:32,fontWeight:700,marginBottom:4}}>{stat.val}</div>
              <div style={{fontSize:13,color:"var(--mist)"}}>{stat.label}</div>
            </div>
          ))}
        </div>
      )}

      {/* New post */}
      {tab==="post"&&(
        <div style={{maxWidth:560}}>
          <div className="composer">
            <div style={{fontWeight:600,marginBottom:12}}>Share your work</div>
            <textarea value={postCaption} onChange={e=>setPostCaption(e.target.value)} placeholder="Write a caption... #BarberLife #Lagos"/>
            {postImg&&(
              <div style={{position:"relative",display:"inline-block",marginTop:12}}>
                <img src={postImg} style={{width:200,height:140,objectFit:"cover",borderRadius:10}} alt="post"/>
                <button className="upload-del" onClick={()=>setPostImg(null)}>✕</button>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
              <label style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:600,color:"var(--slate)"}}>
                <span style={{fontSize:20}}>📷</span> Add photo
                <input type="file" accept="image/*" style={{display:"none"}} onChange={handlePostImg}/>
              </label>
              <button className="btn btn-orange" onClick={handlePost} disabled={posting||(!postCaption.trim()&&!postImg)}>{posting?<><span className="spinner"/> Posting…</>:"Share Post"}</button>

            </div>
          )}

      {/* Info */}
      {tab==="info"&&(
        <div style={{maxWidth:560,display:"flex",flexDirection:"column",gap:16}}>
          <div className="input-wrap"><label className="input-label">Business Name</label><input className="input" value={form.businessName} onChange={e=>setForm({...form,businessName:e.target.value})}/></div>
          <div className="input-wrap"><label className="input-label">Category</label><select className="input" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATEGORIES.map(c=><option key={c.label}>{c.label}</option>)}</select></div>
          <div className="input-wrap"><label className="input-label">Location</label><input className="input" value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="e.g. Surulere, Lagos"/></div>

          <div className="input-wrap"><label className="input-label">WhatsApp</label><input className="input" value={form.contactWhatsapp} onChange={e=>setForm({...form,contactWhatsapp:e.target.value})}/></div>
          <div className="input-wrap"><label className="input-label">Phone</label><input className="input" value={form.contactPhone} onChange={e=>setForm({...form,contactPhone:e.target.value})}/></div>
          <button className="btn btn-orange" style={{alignSelf:"flex-start"}} onClick={saveInfo} disabled={saving}>{saving?<><span className="spinner"/> Saving…</>:"Save Changes"}</button>
        </div>
      )}

      {/* Services */}

// ─── CLIENT DASHBOARD (Instagram-style feed) ─────────────────────────────────
function ClientDashboard({navigate,posts,taskers,onLike,onComment,showToast}) {
  const {user} = useAuth();
  const [commentInputs,setCommentInputs] = useState({});

  const handleComment = (postId) => {
    const text = commentInputs[postId]||"";
    if(!text.trim()) return;
    onComment(postId,text);
    setCommentInputs(prev=>({...prev,[postId]:""}));
  };

  const eliteTaskers = taskers.filter(t=>t.plan==="elite");

  return (
    <div style={{maxWidth:900,margin:"0 auto",padding:"clamp(24px,4vw,48px) clamp(20px,4vw,40px) 80px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(24px,3vw,32px)"}}>Welcome, {user?.name} 👋</h1>
          <p style={{color:"var(--mist)",fontSize:14,marginTop:4}}>See what taskers in your area are up to</p>
        </div>
        <button className="btn btn-orange" onClick={()=>navigate("search")}>Find a Tasker →</button>
      </div>

      {/* Stories-style elite row */}
      {eliteTaskers.length>0&&(
        <div style={{display:"flex",gap:16,overflowX:"auto",paddingBottom:8,marginBottom:28}}>
          {eliteTaskers.map(t=>(
            <div key={t.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,flexShrink:0,cursor:"pointer"}} onClick={()=>navigate("profile",{tasker:t})}>
              <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",border:"3px solid var(--orange)",padding:2}}>
                <div style={{width:"100%",height:"100%",borderRadius:"50%",overflow:"hidden"}} dangerouslySetInnerHTML={{__html:getBizImg(t.category)}}/>
              </div>
              <span style={{fontSize:11,fontWeight:600,maxWidth:70,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.business||t.name}</span>
            </div>
          ))}

      )}

      {posts.length===0?(
        <div className="empty"><div className="empty-icon">📸</div><h3 style={{fontFamily:"'Fraunces',serif",marginBottom:8}}>No posts yet</h3><p>Taskers haven't posted any updates yet. Check back soon!</p></div>
      ):(
        <div className="feed-grid">
          {posts.map(post=>{
            const t = taskers.find(tk=>tk.id===post.taskerId);
            return (
              <div key={post.id} className="feed-card">
                <div className="feed-card-header">
                  <div className="feed-avatar" style={{cursor:"pointer"}} onClick={()=>t&&navigate("profile",{tasker:t})}>
                    <div dangerouslySetInnerHTML={{__html:getBizImg(post.taskerCategory||"Barber")}}/>
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={()=>t&&navigate("profile",{tasker:t})}>{post.taskerName}</div>
                    <div style={{fontSize:11,color:"var(--mist)"}}>{post.taskerCategory} · {t?.location||"Lagos"}</div>
                  </div>
                  {t?.plan==="elite"&&<span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"var(--orange)",background:"var(--orange-glow)",padding:"3px 8px",borderRadius:99}}>⚡ Elite</span>}
                </div>
                <div className="feed-img">
                  {post.img?<img src={post.img} alt="post"/>:<span style={{opacity:.4}}>📸</span>}
                </div>
                <div className="feed-actions">
                  <button className="feed-action-btn" onClick={()=>onLike(post.id)}>{post.liked?"❤️":"🤍"}</button>
                  <button className="feed-action-btn">💬</button>
                  <button className="feed-action-btn">🔗</button>
                </div>
                <div className="feed-likes">{post.likes} like{post.likes!==1?"s":""}</div>
                {post.caption&&<div className="feed-caption"><strong>{post.taskerName}</strong> {post.caption}</div>}
                {post.comments.length>0&&(
                  <div className="feed-comments">
                    {post.comments.slice(-2).map((c,i)=>(
                      <div key={i} className="feed-comment"><strong>{c.user}</strong> {c.text}</div>
                    ))}
                  </div>
                )}
                <div className="feed-add-comment">
                  <input value={commentInputs[post.id]||""} onChange={e=>setCommentInputs(prev=>({...prev,[post.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleComment(post.id)} placeholder="Add a comment…"/>

                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({mode,setMode,onLogin,onRegister,navigate}) {
  const [form,setForm] = useState({email:"",password:"",name:"",role:"client",businessName:""});
  const [errors,setErrors] = useState({});
  const [submitting,setSubmitting] = useState(false);
  const [serverError,setServerError] = useState("");

  const validate = () => {
    const e={};
    if(!/\S+@\S+\.\S+/.test(form.email)) e.email="Valid email required.";
    if(!form.password||form.password.length<6) e.password="Min. 6 characters.";
    if(mode==="register"){if(!form.name.trim())e.name="Full name required.";}
    return e;
  };

  const handleSubmit = async () => {
    setServerError(""); const e=validate(); if(Object.keys(e).length){setErrors(e);return;} setErrors({}); setSubmitting(true);
    if(mode==="register"){
      const result = await postForm({_subject:`🎉 New ${form.role==="provider"?"Tasker":"Client"} — ${form.name}`,form_type:"registration",name:form.name,email:form.email,role:form.role});
      setSubmitting(false); if(!result.ok){setServerError(result.error||"Registration failed.");return;} onRegister({...form});
    } else {
      await postForm({_subject:`🔑 Login — ${form.email}`,form_type:"login",email:form.email});
      setSubmitting(false);
      onLogin({id:"mock_"+Date.now(),email:form.email,name:form.email.split("@")[0],role:form.email.toLowerCase().includes("provider")?"provider":"client"});
    }
  };

  const field = (key,type="text") => ({className:`input${errors[key]?" err":""}`,type,value:form[key],onChange:e=>{setForm({...form,[key]:e.target.value});setErrors({...errors,[key]:""});}});

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:14}}>
            <div className="nav-logo-icon">⚡</div>
            <div className="nav-logo-text">Street<span style={{color:"var(--orange)"}}>Tasker</span></div>
          </div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:26,marginBottom:6}}>{mode==="login"?"Welcome back":"Join for free"}</h2>
          <p style={{color:"var(--mist)",fontSize:14}}>{mode==="login"?"Sign in to your account":"Create your account today"}</p>
        </div>
        <div className="auth-box">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {mode==="register"&&(
              <>
                <div className="input-wrap"><label className="input-label">Full Name</label><input {...field("name")} placeholder="Your full name"/>{errors.name&&<span className="field-err">{errors.name}</span>}</div>
                <div className="input-wrap">
                  <label className="input-label">I am a…</label>
                  <select className="input" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="client">Client — looking for services</option>
                    <option value="provider">Tasker — offering services</option>
                  </select>
                </div>
              </>
            )}
            <div className="input-wrap"><label className="input-label">Email</label><input {...field("email","email")} placeholder="you@example.com"/>{errors.email&&<span className="field-err">{errors.email}</span>}</div>
            <div className="input-wrap"><label className="input-label">Password</label><input {...field("password","password")} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>{errors.password&&<span className="field-err">{errors.password}</span>}</div>
            {serverError&&<div className="error-banner">{serverError}</div>}
            <button className="btn btn-orange btn-full btn-lg" onClick={handleSubmit} disabled={submitting}>{submitting?<><span className="spinner"/> {mode==="login"?"Signing in…":"Creating account…"}</>:mode==="login"?"Sign In":"Create Account"}</button>
            <p style={{textAlign:"center",fontSize:13,color:"var(--mist)"}}>
              {mode==="login"?"No account? ":"Already have one? "}
              <span style={{color:"var(--orange)",cursor:"pointer",fontWeight:600}} onClick={()=>{setMode(mode==="login"?"register":"login");setErrors({});setServerError("");}}>
                {mode==="login"?"Sign up free":"Sign in"}
              </span>
            </p>
            {mode==="login"&&<p style={{textAlign:"center",fontSize:12,color:"var(--mist)",borderTop:"1px solid var(--border)",paddingTop:12}}>💡 Use an email with <strong>"provider"</strong> to demo the Tasker Dashboard</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
function hideSplash() {
  const el = document.getElementById("loading");
  if(el){ el.style.transition="opacity 0.4s"; el.style.opacity="0"; setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },450); }
}
try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
  requestAnimationFrame(()=>requestAnimationFrame(hideSplash));
} catch(err) {
  document.getElementById("loading").innerHTML=`<div style="color:white;text-align:center;padding:32px;max-width:480px"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-family:serif;margin-bottom:12px">Something went wrong</h2><pre style="background:rgba(255,255,255,.1);padding:16px;border-radius:8px;font-size:12px;text-align:left;overflow:auto;max-height:200px">${err.message}</pre><a href="." style="display:inline-block;margin-top:20px;background:#FF6B35;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">Reload</a></div>`;
}
window.addEventListener('error', function() {
  var loading = document.getElementById('loading');
  if(loading && !document.getElementById('root')?.hasChildNodes()) {
    loading.innerHTML='<div style="color:white;text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:16px">⚡</div><h2 style="font-family:serif;margin-bottom:12px">Failed to load</h2><p style="color:rgba(255,255,255,.6);margin-bottom:20px">Check your connection and try again.</p><a href="." style="background:#FF6B35;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">Reload</a></div>';
  }
});
setTimeout(function() {
  var root=document.getElementById('root'); var loading=document.getElementById('loading');
  if(loading&&root&&!root.hasChildNodes()) loading.innerHTML='<div style="color:white;text-align:center;padding:32px"><a href="." style="background:#FF6B35;color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">Taking too long — Reload</a></div>';
},10000);
</script>
