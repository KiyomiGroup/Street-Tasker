<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Browse Tasks — Street Tasker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="navbar-inner">
  <a href="index.html" class="nav-logo"><div class="nav-logo-mark">⚡</div>Street<span>Tasker</span></a>
  <div class="nav-links">
    <a href="browse-tasks.html" class="nav-link active">Browse Tasks</a>
    <a href="post-task.html" class="nav-link">Post a Task</a>
  </div>
  <div class="nav-actions" id="navActions"></div>
</div></nav>

<div class="page-wrap">
  <div class="container" style="padding-top:40px;padding-bottom:80px">
    <!-- Header -->
    <div style="margin-bottom:28px">
      <h1 style="font-size:clamp(1.5rem,3vw,2.25rem);margin-bottom:6px">Browse Tasks</h1>
      <p id="countLabel">Loading tasks…</p>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" style="margin-bottom:28px">
      <div class="form-group" style="flex:2;min-width:180px">
        <label class="form-label">Search</label>
        <input id="searchInput" type="text" class="form-input" placeholder="e.g. house cleaning, delivery…">
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label">Location</label>
        <input id="locationInput" type="text" class="form-input" placeholder="Lagos, Abuja…">
      </div>
      <div class="form-group" style="min-width:140px">
        <label class="form-label">Min budget (₦)</label>
        <input id="minBudget" type="number" class="form-input" placeholder="0" min="0">
      </div>
      <div class="form-group" style="min-width:140px">
        <label class="form-label">Sort by</label>
        <select id="sortBy" class="form-input">
          <option value="newest">Newest first</option>
          <option value="budget_high">Budget: high</option>
          <option value="budget_low">Budget: low</option>
        </select>
      </div>
      <button class="btn btn-brand" onclick="loadTasks()">Search</button>
      <button class="btn btn-ghost" onclick="clearFilters()">Clear</button>
    </div>

    <!-- Category chips -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px" id="catChips">
      <span class="cat-chip active" data-cat="All" onclick="filterCat('All',this)">All categories</span>
    </div>

    <!-- Grid -->
    <div id="tasksGrid" class="grid-3">
      <div class="card skeleton" style="height:200px"></div>
      <div class="card skeleton" style="height:200px"></div>
      <div class="card skeleton" style="height:200px"></div>
      <div class="card skeleton" style="height:200px"></div>
      <div class="card skeleton" style="height:200px"></div>
      <div class="card skeleton" style="height:200px"></div>
    </div>

    <!-- Load more -->
    <div style="text-align:center;margin-top:32px">
      <button id="loadMoreBtn" class="btn btn-outline btn-lg" onclick="loadMore()" style="display:none">Load more tasks</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="bn-item"><span class="bn-icon">🏠</span>Home</a>
  <a href="browse-tasks.html" class="bn-item active"><span class="bn-icon">🔍</span>Browse</a>
  <button class="bn-fab" onclick="window.location.href='post-task.html'">+</button>
  <a href="dashboard.html" class="bn-item"><span class="bn-icon">📊</span>Dashboard</a>
  <a href="profile.html" class="bn-item"><span class="bn-icon">👤</span>Profile</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const CATS = ['All','Cleaning','Delivery','Errands','Moving','Home Repairs','Gardening','Tech Help','Personal Help','Painting','Pet Care','Cooking','Tutoring'];
const LIMIT = 12;
let offset = 0, currentCat = 'All', allLoaded = false;

// Parse URL params
const params = new URLSearchParams(window.location.search);
if (params.get('category')) currentCat = params.get('category');
if (params.get('search')) setTimeout(() => document.getElementById('searchInput').value = params.get('search'), 100);

// Render category chips
document.getElementById('catChips').innerHTML = CATS.map(c =>
  `<span class="cat-chip${c === currentCat ? ' active' : ''}" data-cat="${c}" onclick="filterCat('${c}',this)">${c === 'All' ? 'All categories' : c}</span>`
).join('');

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  offset = 0; allLoaded = false;
  loadTasks();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('locationInput').value = '';
  document.getElementById('minBudget').value = '';
  document.getElementById('sortBy').value = 'newest';
  currentCat = 'All';
  document.querySelectorAll('.cat-chip').forEach(c => { c.classList.toggle('active', c.dataset.cat === 'All'); });
  offset = 0; allLoaded = false; loadTasks();
}

async function loadTasks(append = false) {
  if (!append) { offset = 0; allLoaded = false; }
  const grid = document.getElementById('tasksGrid');
  if (!append) grid.innerHTML = `<div class="card skeleton" style="height:200px"></div>`.repeat(6);

  try {
    const search = document.getElementById('searchInput').value;
    const location = document.getElementById('locationInput').value;
    const minBudget = parseFloat(document.getElementById('minBudget').value) || 0;
    const sortBy = document.getElementById('sortBy').value;

    let q = _sb.from('tasks')
      .select('*, poster:created_by(id,name,avatar_url,rating)')
      .eq('status', 'open');
    if (currentCat !== 'All') q = q.eq('category', currentCat);
    if (search) q = q.ilike('title', `%${search}%`);
    if (location) q = q.ilike('location', `%${location}%`);
    if (minBudget > 0) q = q.gte('budget', minBudget);
    if (sortBy === 'newest') q = q.order('created_at', { ascending: false });
    else if (sortBy === 'budget_high') q = q.order('budget', { ascending: false });
    else q = q.order('budget', { ascending: true });
    q = q.range(offset, offset + LIMIT - 1);

    const { data: tasks, error } = await q;
    if (error) throw error;

    if (!append) grid.innerHTML = '';

    if (!tasks.length && !append) {
      grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty"><div class="empty-icon">🔍</div><h3 class="empty-title">No tasks found</h3><p class="empty-desc">Try different filters or be the first to post a task in this category.</p><a href="post-task.html" class="btn btn-brand">Post a Task</a></div></div>`;
      document.getElementById('loadMoreBtn').style.display = 'none';
      document.getElementById('countLabel').textContent = '0 tasks';
      return;
    }

    tasks.forEach(t => {
      const card = document.createElement('a');
      card.href = `task-details.html?id=${t.id}`;
      card.className = 'task-card';
      card.innerHTML = `
        <div class="task-card-top">
          <div>
            <div class="task-card-title">${Utils.sanitize(t.title)}</div>
            <span class="badge badge-gray" style="margin-top:4px">${Utils.sanitize(t.category)}</span>
          </div>
          <div class="task-card-budget">${Utils.fmt(t.budget)}</div>
        </div>
        <div class="task-card-desc">${Utils.sanitize(t.description)}</div>
        <div class="task-meta">
          <span class="task-meta-item">📍 ${Utils.sanitize(t.location)}</span>
          <span class="task-meta-item">🕐 ${Utils.timeAgo(t.created_at)}</span>
          ${t.deadline ? `<span class="task-meta-item">📅 Due ${new Date(t.deadline).toLocaleDateString('en-NG',{day:'numeric',month:'short'})}</span>` : ''}
        </div>
        <div class="task-card-footer">
          <div style="display:flex;align-items:center;gap:8px">${Utils.avatar(t.poster,'xs')}<span style="font-size:.8125rem;color:var(--mist);font-weight:500">${Utils.sanitize(t.poster?.name || 'Anonymous')}</span></div>
          <span class="btn btn-brand btn-sm">Apply →</span>
        </div>`;
      grid.appendChild(card);
    });

    offset += tasks.length;
    document.getElementById('countLabel').textContent = `${offset} task${offset !== 1 ? 's' : ''} found`;
    document.getElementById('loadMoreBtn').style.display = tasks.length < LIMIT ? 'none' : 'block';
    if (tasks.length < LIMIT) allLoaded = true;

  } catch(e) {
    grid.innerHTML = `<div style="grid-column:1/-1"><div class="card"><p>⚠️ Could not load tasks. Make sure Supabase is configured.</p></div></div>`;
  }
}

function loadMore() {
  if (!allLoaded) loadTasks(true);
}

// Nav
async function initNav() {
  const user = await Auth.getUser();
  const el = document.getElementById('navActions');
  if (user) {
    const p = await DB.getProfile(user.id).catch(() => null);
    el.innerHTML = `<a href="post-task.html" class="btn btn-brand btn-sm">+ Post Task</a><div class="nav-user" onclick="window.location.href='dashboard.html'">${Utils.avatar(p,'xs')}<span class="nav-user-name">${p?.name||'Me'}</span></div>`;
  } else {
    el.innerHTML = `<a href="login.html" class="btn btn-outline btn-sm">Sign in</a><a href="signup.html" class="btn btn-brand btn-sm">Get started</a>`;
  }
}

loadTasks();
initNav();
</script>
</body>
</html>
