<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile — Street Tasker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar"><div class="navbar-inner">
  <a href="index.html" class="nav-logo"><div class="nav-logo-mark">⚡</div>Street<span>Tasker</span></a>
  <div class="nav-actions" id="navActions"></div>
</div></nav>

<div class="page-wrap" id="pageContent">
  <div class="card skeleton" style="height:300px;border-radius:0;margin:0"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="bn-item"><span class="bn-icon">🏠</span>Home</a>
  <a href="browse-tasks.html" class="bn-item"><span class="bn-icon">🔍</span>Browse</a>
  <button class="bn-fab" onclick="window.location.href='post-task.html'">+</button>
  <a href="dashboard.html" class="bn-item"><span class="bn-icon">📊</span>Dashboard</a>
  <a href="#" class="bn-item active"><span class="bn-icon">👤</span>Profile</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
let profileUser = null, currentUser = null;
const profileId = Utils.qs('id');

async function init() {
  currentUser = await Auth.getUser();
  const navEl = document.getElementById('navActions');
  if (currentUser) {
    const cp = await DB.getProfile(currentUser.id).catch(() => null);
    navEl.innerHTML = `<div class="nav-user" onclick="window.location.href='dashboard.html'">${Utils.avatar(cp,'xs')}<span class="nav-user-name">${cp?.name||'Me'}</span></div>`;
  } else {
    navEl.innerHTML = `<a href="login.html" class="btn btn-outline btn-sm">Sign in</a><a href="signup.html" class="btn btn-brand btn-sm">Get started</a>`;
  }

  const id = profileId || currentUser?.id;
  if (!id) { window.location.href = 'login.html'; return; }

  try {
    profileUser = await DB.getProfile(id);
    const [reviews, tasks] = await Promise.all([
      DB.getReviews(id),
      DB.getTasks({ limit: 6 }).then(t => t.filter(tk => tk.created_by === id || tk.assigned_to === id)).catch(() => [])
    ]);
    render(profileUser, reviews, tasks);
  } catch(e) {
    document.getElementById('pageContent').innerHTML = '<div class="container" style="padding-top:60px"><div class="empty"><div class="empty-icon">❌</div><h3 class="empty-title">Profile not found</h3></div></div>';
  }
}

function render(p, reviews, tasks) {
  const isMe = currentUser?.id === p.id;
  const avgRating = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1) : '—';

  document.getElementById('pageContent').innerHTML = `
    <!-- Hero -->
    <div style="background:var(--ink);padding:clamp(36px,5vw,64px) 0">
      <div class="container" style="max-width:1000px">
        <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
          ${Utils.avatar(p, 'xl')}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">
              <h1 style="color:white;font-size:clamp(1.5rem,3vw,2rem)">${Utils.sanitize(p.name)}</h1>
              ${p.verified ? '<span class="badge badge-teal">✓ Verified</span>' : ''}
              ${p.banned ? '<span class="badge badge-red">⛔ Banned</span>' : ''}
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">
              <span style="color:rgba(255,255,255,.6);font-size:.875rem;text-transform:capitalize">👤 ${p.role || 'Member'}</span>
              ${p.location ? `<span style="color:rgba(255,255,255,.6);font-size:.875rem">📍 ${Utils.sanitize(p.location)}</span>` : ''}
              <span style="color:rgba(255,255,255,.6);font-size:.875rem">✅ ${p.jobs_completed || 0} jobs completed</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
              <span class="stars">${Utils.stars(p.rating)}</span>
              <span style="color:white;font-weight:700">${p.rating || 0}</span>
              <span style="color:rgba(255,255,255,.4);font-size:.8125rem">(${reviews.length} reviews)</span>
            </div>
            ${p.bio ? `<p style="color:rgba(255,255,255,.6);max-width:560px;line-height:1.7;font-size:.9375rem">${Utils.sanitize(p.bio)}</p>` : ''}
          </div>
          ${isMe ? `<a href="dashboard.html" class="btn btn-outline" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.25);flex-shrink:0">Edit Profile</a>` : ''}
        </div>
        ${(p.skills || []).length ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">${p.skills.map(s => `<span style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--rfull);padding:5px 12px;font-size:.8125rem;font-weight:600;color:rgba(255,255,255,.8)">${Utils.sanitize(s)}</span>`).join('')}</div>` : ''}
      </div>
    </div>

    <!-- Content -->
    <div class="container" style="max-width:1000px;padding-top:36px;padding-bottom:80px">
      <div style="display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start">
        <div>
          <!-- Stats -->
          <div class="grid-3" style="margin-bottom:24px">
            <div class="card" style="text-align:center"><div style="font-family:var(--fd);font-size:2rem;font-weight:800;color:var(--brand)">${p.jobs_completed || 0}</div><div style="font-size:.875rem;color:var(--mist)">Jobs Done</div></div>
            <div class="card" style="text-align:center"><div style="font-family:var(--fd);font-size:2rem;font-weight:800;color:var(--brand)">${avgRating}</div><div style="font-size:.875rem;color:var(--mist)">Avg Rating</div></div>
            <div class="card" style="text-align:center"><div style="font-family:var(--fd);font-size:2rem;font-weight:800;color:var(--brand)">${reviews.length}</div><div style="font-size:.875rem;color:var(--mist)">Reviews</div></div>
          </div>

          <!-- Reviews -->
          <div class="card" style="margin-bottom:20px">
            <h3 style="margin-bottom:20px">Reviews (${reviews.length})</h3>
            ${reviews.length ? reviews.map(r => `
              <div style="padding:16px 0;border-bottom:1px solid var(--border)">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                  <div style="display:flex;align-items:center;gap:10px">
                    ${Utils.avatar(r.reviewer,'sm')}
                    <div>
                      <div style="font-weight:700;font-size:.875rem">${Utils.sanitize(r.reviewer?.name || 'User')}</div>
                      <div style="font-size:.75rem;color:var(--mist)">${Utils.timeAgo(r.created_at)}</div>
                    </div>
                  </div>
                  <span class="stars">${Utils.stars(r.rating)}</span>
                </div>
                ${r.comment ? `<p style="font-size:.875rem;color:var(--slate);font-style:italic">"${Utils.sanitize(r.comment)}"</p>` : ''}
              </div>`).join('') : '<div class="empty" style="padding:32px"><div class="empty-icon">⭐</div><p class="empty-desc">No reviews yet.</p></div>'}
          </div>
        </div>

        <!-- Sidebar contact -->
        <div style="position:sticky;top:calc(var(--nav-h)+20px)">
          ${!isMe ? `<div class="card" style="margin-bottom:16px">
            <h4 style="margin-bottom:14px">Contact ${Utils.sanitize(p.name.split(' ')[0])}</h4>
            <a href="browse-tasks.html" class="btn btn-brand btn-full btn-lg">Post a Task →</a>
            <p style="font-size:.75rem;color:var(--mist);text-align:center;margin-top:10px">Post a task and ${Utils.sanitize(p.name.split(' ')[0])} can apply</p>
          </div>` : ''}
          <div class="card">
            <h4 style="margin-bottom:14px">Member since</h4>
            <p style="font-size:.875rem">${new Date(p.created_at || Date.now()).toLocaleDateString('en-NG',{month:'long',year:'numeric'})}</p>
            ${p.location ? `<div class="divider"></div><h4 style="margin-bottom:6px">Location</h4><p style="font-size:.875rem">📍 ${Utils.sanitize(p.location)}</p>` : ''}
            ${(p.skills || []).length ? `<div class="divider"></div><h4 style="margin-bottom:10px">Skills</h4><div style="display:flex;gap:6px;flex-wrap:wrap">${p.skills.map(s=>`<span class="badge badge-gray">${Utils.sanitize(s)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
